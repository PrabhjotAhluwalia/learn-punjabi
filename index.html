<style>
/* ===================== DESIGN SYSTEM: "Punjab Sunset" ===================== */
:root{
  --bg-deep:#1A0533; --bg-deep2:#2D0A4E; --bg-card:#FFF8F0;
  --primary:#FF6B2B; --accent:#FFD700; --green:#2ECC71; --red:#E74C3C; --ink:#3A1A14;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  margin:0; font-family:'Nunito',sans-serif; color:var(--ink);
  background:linear-gradient(160deg,#1A0533 0%,#2D0A4E 45%,#4A1259 100%);
  background-attachment:fixed; min-height:100vh; overflow-x:hidden;
}
h1,h2,h3,h4,.display{font-family:'Baloo 2',cursive;}
.gur{font-family:'Noto Sans Gurmukhi',sans-serif; line-height:1.6;}
.gur-min{font-size:22px;}             /* never below 22px */
.gur-lg{font-size:34px; font-weight:600;}
.gur-xl{font-size:64px; font-weight:700;}

/* scrollbar */
::-webkit-scrollbar{width:11px;height:11px;}
::-webkit-scrollbar-track{background:rgba(255,255,255,.06);}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--primary),var(--accent));border-radius:9px;}

/* ===== Warm sunset hero gradient ===== */
.sunset-hero{
  background:radial-gradient(120% 90% at 50% 0%,#FF6B2B 0%,#FF9A4D 22%,#7A1FA0 60%,#1A0533 100%);
}
.gold-text{background:linear-gradient(90deg,#FFD700,#FF6B2B);-webkit-background-clip:text;background-clip:text;color:transparent;}

/* ===== Phulkari-inspired CSS border (pure geometric) ===== */
.phulkari{
  position:relative; border-radius:24px;
  background:
    repeating-linear-gradient(45deg, transparent 0 8px, rgba(255,107,43,.0) 8px 16px);
}
.phulkari-border{
  border:6px solid transparent;
  border-image:repeating-linear-gradient(
    45deg,#FF6B2B 0 10px,#FFD700 10px 20px,#E74C3C 20px 30px,#2ECC71 30px 40px) 6;
  border-radius:18px;
}
.phulkari-top{
  height:18px;width:100%;
  background:
    radial-gradient(circle at 10px 9px, #FFD700 4px, transparent 5px),
    radial-gradient(circle at 30px 9px, #FF6B2B 4px, transparent 5px),
    radial-gradient(circle at 50px 9px, #E74C3C 4px, transparent 5px),
    radial-gradient(circle at 70px 9px, #2ECC71 4px, transparent 5px);
  background-size:80px 18px; background-repeat:repeat-x; opacity:.85;
}
.phulkari-diamond{
  background-image:
    linear-gradient(135deg,rgba(255,107,43,.18) 25%,transparent 25%),
    linear-gradient(225deg,rgba(255,215,0,.18) 25%,transparent 25%),
    linear-gradient(45deg,rgba(231,76,60,.14) 25%,transparent 25%),
    linear-gradient(315deg,rgba(46,204,113,.14) 25%,transparent 25%);
  background-position:14px 0,14px 0,0 0,0 0; background-size:28px 28px;
}

/* ===== Cards ===== */
.card-cream{background:var(--bg-card);border-radius:22px;box-shadow:0 18px 40px -18px rgba(0,0,0,.55);}
.glass{background:rgba(255,255,255,.07);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.14);border-radius:20px;}

/* ===== Buttons ===== */
.btn{font-family:'Baloo 2',cursive;font-weight:700;border:none;cursor:pointer;border-radius:16px;
  transition:transform .12s ease,box-shadow .18s ease,filter .18s ease;}
.btn:active{transform:translateY(2px) scale(.98);}
.btn-primary{background:linear-gradient(180deg,#FF8C42,#FF6B2B);color:#fff;box-shadow:0 6px 0 #c4501c;}
.btn-primary:hover{filter:brightness(1.05);}
.btn-primary:active{box-shadow:0 2px 0 #c4501c;}
.btn-gold{background:linear-gradient(180deg,#FFE05A,#FFD700);color:#5a3b00;box-shadow:0 6px 0 #c9a800;}
.btn-gold:active{box-shadow:0 2px 0 #c9a800;}
.btn-ghost{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.25);}

/* ===== Speak button ===== */
.speak-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  background:linear-gradient(180deg,#FF8C42,#FF6B2B);color:#fff;border:none;border-radius:50%;
  width:42px;height:42px;cursor:pointer;flex:none;box-shadow:0 4px 0 #c4501c;transition:.12s;}
.speak-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #c4501c;}
.speak-btn.sm{width:34px;height:34px;}
.speak-btn.speaking{animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,.6),0 4px 0 #c4501c;}50%{box-shadow:0 0 0 9px rgba(255,215,0,0),0 4px 0 #c4501c;}}

/* ===== Tab bar ===== */
.tabbar{background:rgba(26,5,51,.85);backdrop-filter:blur(14px);border-top:2px solid rgba(255,215,0,.25);}
.tab-item{transition:.18s;color:#cbb8e6;}
.tab-item.active{color:#FFD700;}
.tab-item.active .tab-ico{transform:translateY(-3px) scale(1.12);}
.tab-ico{transition:.18s;}

/* ===== Confetti ===== */
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;}
.confetti{position:absolute;width:11px;height:16px;top:-20px;opacity:.95;border-radius:2px;
  animation:confFall linear forwards;}
@keyframes confFall{
  0%{transform:translateY(-20px) rotateZ(0deg);opacity:1;}
  100%{transform:translateY(105vh) rotateZ(720deg);opacity:.4;}
}

/* ===== Trace grid ===== */
.trace-grid{
  background-image:
    linear-gradient(rgba(255,107,43,.25) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,107,43,.25) 1px,transparent 1px),
    linear-gradient(rgba(255,107,43,.5) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,107,43,.5) 1px,transparent 1px);
  background-size:25% 25%,25% 25%,50% 50%,50% 50%;
  background-position:0 0;
}
.trace-cross{position:absolute;inset:0;}
.trace-cross::before,.trace-cross::after{content:"";position:absolute;background:rgba(231,76,60,.4);}
.trace-cross::before{left:50%;top:0;bottom:0;width:1px;transform:translateX(-.5px);border-left:1px dashed rgba(231,76,60,.5);background:none;}
.trace-cross::after{top:50%;left:0;right:0;height:1px;transform:translateY(-.5px);border-top:1px dashed rgba(231,76,60,.5);background:none;}

/* ===== Flip card ===== */
.flip{perspective:1200px;}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d;}
.flip.flipped .flip-inner{transform:rotateY(180deg);}
.flip-face{position:absolute;inset:0;backface-visibility:hidden;display:flex;flex-direction:column;
  align-items:center;justify-content:center;border-radius:22px;}
.flip-back{transform:rotateY(180deg);}

/* ===== Progress ring / bar ===== */
.bar-track{background:rgba(255,255,255,.15);border-radius:999px;overflow:hidden;}
.bar-fill{background:linear-gradient(90deg,#FFD700,#FF6B2B);height:100%;border-radius:999px;transition:width .6s ease;}

/* ===== High contrast ===== */
body.hc{filter:contrast(1.18) saturate(1.12);}
body.hc .card-cream{background:#fff;}
body.hc .glass{background:rgba(0,0,0,.55);border-color:#FFD700;}

/* ===== focus a11y ===== */
:focus-visible{outline:3px solid #FFD700;outline-offset:2px;border-radius:6px;}

/* misc */
.no-scrollbar::-webkit-scrollbar{display:none;}
.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none;}
.shadow-soft{box-shadow:0 10px 30px -12px rgba(0,0,0,.5);}
@media (max-width:640px){ .gur-xl{font-size:48px;} .gur-lg{font-size:28px;} }
</style>
</head>

<script type="text/babel" data-presets="react">
/* ============================================================================
   ਸਤਿ ਸ੍ਰੀ ਅਕਾਲ — Learn Punjabi
   Single-file React app. All data inline. Web Speech API for audio.
   ============================================================================ */
const { useState, useEffect, useRef, useMemo, useCallback } = React;
const { motion, AnimatePresence } = window.Motion || window.framerMotion || {};
const M = (window.Motion || window.framerMotion || {});
const Mdiv  = (M && M.motion) ? M.motion.div  : 'div';
const Mbtn  = (M && M.motion) ? M.motion.button : 'button';
const MSpan = (M && M.motion) ? M.motion.span : 'span';
const AP    = (M && M.AnimatePresence) ? M.AnimatePresence : ({children})=>children;

/* ======================= SPEECH ENGINE (Web Speech API) ===================== */
const Speech = {
  voices: [],
  ready: false,
  unsupported: false,
  noVoiceWarned: false,
  warnCb: null,
  init(){
    if(!('speechSynthesis' in window)){ Speech.unsupported = true; return; }
    const load = ()=>{ try{ Speech.voices = window.speechSynthesis.getVoices()||[]; }catch(e){ Speech.voices=[]; } Speech.ready = true; };
    load();
    // voices frequently load async — listen and also poll a few times
    try{ window.speechSynthesis.onvoiceschanged = load; }catch(e){}
    let tries = 0;
    const poll = setInterval(()=>{ load(); if(Speech.voices.length || ++tries > 12) clearInterval(poll); }, 250);
    // Chrome bug: synth pauses when tab idle. Keep it alive.
    try{
      setInterval(()=>{ if(window.speechSynthesis && window.speechSynthesis.speaking){ window.speechSynthesis.pause(); window.speechSynthesis.resume(); } }, 9000);
    }catch(e){}
  },
  pick(){
    const vs = (Speech.voices && Speech.voices.length) ? Speech.voices : (window.speechSynthesis ? (window.speechSynthesis.getVoices()||[]) : []);
    Speech.voices = vs;
    // Prefer Punjabi → Hindi (closest) → any Indian voice → any voice at all.
    return vs.find(v=>/pa[-_]?IN|punjab/i.test((v.lang||'')+(v.name||'')))
        || vs.find(v=>/^pa/i.test(v.lang||''))
        || vs.find(v=>/hi[-_]?IN/i.test(v.lang||''))
        || vs.find(v=>/^hi/i.test(v.lang||''))
        || vs.find(v=>/[-_]IN\b|india/i.test((v.lang||'')+(v.name||'')))
        || vs.find(v=>/^en/i.test(v.lang||''))
        || vs[0]
        || null;
  },
  speak(text, opts={}){
    opts = opts || {};
    if(Speech.unsupported || !('speechSynthesis' in window)){
      if(Speech.warnCb && !Speech.noVoiceWarned){ Speech.noVoiceWarned = true; Speech.warnCb('Your browser does not support speech. Try Chrome, Edge or Safari.'); }
      opts.onend && opts.onend();
      return;
    }
    if(!text){ opts.onend && opts.onend(); return; }
    try{
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      const v = Speech.pick();
      if(v){ u.voice = v; u.lang = v.lang || 'hi-IN'; }
      else {
        // No voice object available yet — set a broad Indic lang and hope the OS routes it.
        u.lang = 'hi-IN';
        // If, after voices are known, there are simply none usable, warn once.
        if(Speech.ready && (!Speech.voices || Speech.voices.length===0) && Speech.warnCb && !Speech.noVoiceWarned){
          Speech.noVoiceWarned = true;
          Speech.warnCb('No speech voice found on this device. On phones, install a Hindi/Punjabi voice in Settings → Accessibility → Text-to-Speech.');
        }
      }
      u.rate = (opts.rate != null) ? opts.rate : 0.82;
      u.pitch = (opts.pitch != null) ? opts.pitch : 1.0;
      u.volume = 1;
      let done = false;
      const finish = ()=>{ if(done) return; done = true; opts.onend && opts.onend(); };
      u.onend = finish;
      u.onerror = finish;
      window.speechSynthesis.speak(u);
      // Chrome sometimes needs a nudge to actually start.
      try{ window.speechSynthesis.resume(); }catch(e){}
      // Safety: clear the "speaking" UI even if no end event ever fires.
      setTimeout(finish, Math.max(2500, text.length * 220));
    }catch(e){ opts.onend && opts.onend(); }
  },
  stop(){ try{ window.speechSynthesis.cancel(); }catch(e){} }
};
Speech.init();

/* ======================= STORAGE ===================== */
const LS = {
  get(k,d){ try{ const v=localStorage.getItem('pj_'+k); return v==null?d:JSON.parse(v);}catch(e){return d;} },
  set(k,v){ try{ localStorage.setItem('pj_'+k, JSON.stringify(v)); }catch(e){} }
};

/* ======================= ICONS (lucide) ===================== */
function Icon({name, size=22, color='currentColor', strokeWidth=2.2, className=''}){
  const ref = useRef(null);
  useEffect(()=>{
    if(ref.current && window.lucide){
      ref.current.innerHTML='';
      const el = document.createElement('i');
      el.setAttribute('data-lucide', name);
      ref.current.appendChild(el);
      try{ window.lucide.createIcons({attrs:{width:size,height:size,stroke:color,'stroke-width':strokeWidth}, nameAttr:'data-lucide'}); }catch(e){}
    }
  },[name,size,color,strokeWidth]);
  return <span ref={ref} className={'inline-flex items-center justify-center '+className} style={{width:size,height:size}}/>;
}

/* ======================= SPEAK BUTTON ===================== */
function Speak({text, label, sm, rate}){
  const [on,setOn]=useState(false);
  const go=(e)=>{
    e&&e.stopPropagation();
    if(on){ Speech.stop(); setOn(false); return; }
    setOn(true);
    Speech.speak(text,{rate, onend:()=>setOn(false)});
  };
  return (
    <button type="button" className={'speak-btn '+(sm?'sm ':'')+(on?'speaking':'')} onClick={go}
      aria-label={'Listen'+(label?': '+label:'')} title="Listen">
      <Icon name={on?'volume-2':'volume-2'} size={sm?16:18} color="#fff"/>
    </button>
  );
}

/* ======================= CONFETTI ===================== */
function fireConfetti(count=120){
  const root = document.getElementById('confetti-root');
  if(!root) return;
  const wrap = document.createElement('div'); wrap.className='confetti-wrap';
  const colors=['#FF6B2B','#FFD700','#E74C3C','#2ECC71','#FF9A4D','#fff'];
  for(let i=0;i<count;i++){
    const c=document.createElement('div'); c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[i%colors.length];
    c.style.animationDuration=(2.4+Math.random()*1.8)+'s';
    c.style.animationDelay=(Math.random()*0.5)+'s';
    c.style.width=(7+Math.random()*8)+'px';
    c.style.height=(11+Math.random()*10)+'px';
    if(Math.random()>.5) c.style.borderRadius='50%';
    wrap.appendChild(c);
  }
  root.appendChild(wrap);
  setTimeout(()=>{ root.removeChild(wrap); },4600);
}

/* ======================= SHARED UI ===================== */
function SectionTitle({kicker,title,sub,light}){
  return (
    <div className="text-center mb-7">
      {kicker && <div className="font-display font-bold tracking-widest text-sm mb-1" style={{color:'#FF6B2B'}}>{kicker}</div>}
      <h2 className={'font-display font-extrabold text-3xl sm:text-4xl '+(light?'text-white':'text-pj-ink')}>{title}</h2>
      {sub && <p className={'mt-2 max-w-2xl mx-auto '+(light?'text-purple-100/80':'text-pj-ink/70')}>{sub}</p>}
    </div>
  );
}
function Pill({children,color='primary',className=''}){
  const map={primary:'#FF6B2B',gold:'#FFD700',green:'#2ECC71',red:'#E74C3C',purple:'#7A1FA0'};
  const txt = color==='gold'?'#5a3b00':'#fff';
  return <span className={'inline-block rounded-full px-3 py-1 text-xs font-bold font-display '+className}
    style={{background:map[color],color:txt}}>{children}</span>;
}
function Card({children,className='',cream=true,onClick}){
  return <div onClick={onClick} className={(cream?'card-cream ':'glass ')+className}>{children}</div>;
}
function ProgressBar({pct,height=12}){
  return <div className="bar-track w-full" style={{height}}><div className="bar-fill" style={{width:Math.min(100,pct)+'%'}}/></div>;
}
function Toast({msg}){
  if(!msg) return null;
  return <div className="fixed left-1/2 -translate-x-1/2 bottom-24 z-[9000] px-5 py-3 rounded-2xl font-display font-bold text-white shadow-soft"
    style={{background:'rgba(26,5,51,.95)',border:'1px solid #FFD700'}}>{msg}</div>;
}
function shuffle(a){const r=a.slice();for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function sample(arr,n,exclude){const pool=arr.filter(x=>x!==exclude);return shuffle(pool).slice(0,n);}

/* ============================================================================
   DATA — GURMUKHI SCRIPT (35 consonants ਪੈਂਤੀ + extras + vowels + matras)
   ============================================================================ */
const GURMUKHI = [
 {char:'ੳ', name:'Ura', nameGurmukhi:'ੳੜਾ', romanization:'u/o (vowel-bearer)', ipaSound:'∅', englishApprox:'silent carrier for u/oo/o vowels', exampleWord:'ਉੱਲੂ', exampleMeaning:'owl', strokeOrder:'One continuous hooked stroke, top-left curving down and around like a fish-hook.', category:'consonant'},
 {char:'ਅ', name:'Aira', nameGurmukhi:'ਐੜਾ', romanization:'a', ipaSound:'ə', englishApprox:'a in "about"', exampleWord:'ਅੰਬ', exampleMeaning:'mango', strokeOrder:'Vertical stem on right; open curl to the left. Draw the curl first, then the stem.', category:'consonant'},
 {char:'ੲ', name:'Iri', nameGurmukhi:'ਈੜੀ', romanization:'i/e (vowel-bearer)', ipaSound:'∅', englishApprox:'silent carrier for i/ee/e vowels', exampleWord:'ਇਮਲੀ', exampleMeaning:'tamarind', strokeOrder:'Like a sideways S — top loop then bottom loop, left to right.', category:'consonant'},
 {char:'ਸ', name:'Sassa', nameGurmukhi:'ਸੱਸਾ', romanization:'s', ipaSound:'s', englishApprox:'s in "sun"', exampleWord:'ਸੇਬ', exampleMeaning:'apple', strokeOrder:'Headline, then a curved body hanging below with a small tail.', category:'consonant'},
 {char:'ਹ', name:'Haha', nameGurmukhi:'ਹਾਹਾ', romanization:'h', ipaSound:'ɦ', englishApprox:'h in "house"', exampleWord:'ਹਾਥੀ', exampleMeaning:'elephant', strokeOrder:'Headline with a looped descender resembling a "6".', category:'consonant'},
 {char:'ਕ', name:'Kakka', nameGurmukhi:'ਕੱਕਾ', romanization:'k', ipaSound:'k', englishApprox:'k in "skip" (unaspirated)', exampleWord:'ਕਮਲ', exampleMeaning:'lotus', strokeOrder:'Headline; vertical stem then a small left foot at the base.', category:'consonant'},
 {char:'ਖ', name:'Khakkha', nameGurmukhi:'ਖੱਖਾ', romanization:'kh', ipaSound:'kʰ', englishApprox:'k in "kit" (aspirated, puff of air)', exampleWord:'ਖਰਗੋਸ਼', exampleMeaning:'rabbit', strokeOrder:'Headline; rounded body with an inner loop, descender on right.', category:'consonant'},
 {char:'ਗ', name:'Gagga', nameGurmukhi:'ਗੱਗਾ', romanization:'g', ipaSound:'ɡ', englishApprox:'g in "go"', exampleWord:'ਗਾਂ', exampleMeaning:'cow', strokeOrder:'Headline; open curve to left with a descending stem.', category:'consonant'},
 {char:'ਘ', name:'Ghagga', nameGurmukhi:'ਘੱਗਾ', romanization:'gh', ipaSound:'ɡʱ', englishApprox:'g in "doghouse" (breathy/voiced aspirate)', exampleWord:'ਘਰ', exampleMeaning:'house', strokeOrder:'Headline; a humped body with two lobes and a foot.', category:'consonant'},
 {char:'ਙ', name:'Nganga', nameGurmukhi:'ਙੰਙਾ', romanization:'ṅ', ipaSound:'ŋ', englishApprox:'ng in "sing"', exampleWord:'ਵੰਙ', exampleMeaning:'bangle', strokeOrder:'Headline; small dotted nasal body — rare, mostly in compounds.', category:'consonant'},
 {char:'ਚ', name:'Chacha', nameGurmukhi:'ਚੱਚਾ', romanization:'ch', ipaSound:'tʃ', englishApprox:'ch in "church" (unaspirated)', exampleWord:'ਚੰਦ', exampleMeaning:'moon', strokeOrder:'Headline; curved body opening left with a small hook.', category:'consonant'},
 {char:'ਛ', name:'Chhachha', nameGurmukhi:'ਛੱਛਾ', romanization:'chh', ipaSound:'tʃʰ', englishApprox:'ch in "chat" (aspirated)', exampleWord:'ਛੱਤਰੀ', exampleMeaning:'umbrella', strokeOrder:'Headline; circular body with a dot/loop inside.', category:'consonant'},

  {id:'L6', title:'Pronouns & the verb "to be"', concept:'Personal pronouns: ਮੈਂ (I), ਤੂੰ (you-informal), ਤੁਸੀਂ (you-formal/plural), ਆਪ (you-very respectful), ਉਹ (he/she/they), ਅਸੀਂ (we). The verb "to be": ਹਾਂ (am), ਹੈ (is), ਹੋ (are-you formal), ਹਨ (are-they).',

  {id:'L7', title:'Adjectives & Noun Agreement', concept:'Most adjectives ending in -ਾ change for gender/number: ਵੱਡਾ (big-masc.sing) → ਵੱਡੀ (fem) → ਵੱਡੇ (masc.plural/oblique). Adjectives ending in consonants (ਲਾਲ, ਖ਼ੁਸ਼) never change.',

  {id:'L8', title:'Common Verbs (infinitive)', concept:'Punjabi infinitives end in -ਣਾ or -ਨਾ (ਖਾਣਾ "to eat", ਪੀਣਾ "to drink"). The dictionary/infinitive form is the base you conjugate from. Verb always comes last in the sentence.',

LESSONS.push({level:3, levelName:'Daily Life', lessons:[
  {id:'L9', title:'Food & Eating', concept:'Word "to eat/drink" + the food. Politeness in eating: ਲਓ ("please take/have") is offered constantly. Note ਰੋਟੀ also means "a meal" generally.',
   cultural:'Punjabi food is the global face of "Indian food" — butter chicken, naan, sarson da saag. Refusing food once is normal; a host will insist 2–3 times (ਜ਼ਰੂਰ ਖਾਓ). Take a little to honor them.',

  {id:'L10', title:'Home & Body', concept:'Locative postposition ਵਿੱਚ ("in") and ਉੱਤੇ ("on") to describe rooms and objects. Body parts often appear in idioms (ਦਿਲ "heart" = courage/love).',

  {id:'L11', title:'Present Tense — full conjugation', concept:'Habitual present = verb-stem + ਦਾ/ਦੀ/ਦੇ (agreeing with subject gender/number) + auxiliary ਹਾਂ/ਹੈਂ/ਹੈ/ਹੋ/ਹਨ. Example ਖਾਣਾ→ ਮੈਂ ਖਾਂਦਾ ਹਾਂ (I eat, masc).',

   quiz:[{q:'A woman says "I eat" as…',opts:['ਮੈਂ ਖਾਂਦਾ ਹਾਂ','ਮੈਂ ਖਾਂਦੀ ਹਾਂ','ਮੈਂ ਖਾਧਾ','ਮੈਂ ਖਾਵਾਂਗਾ'],a:1},{q:'Present habitual adds…',opts:['-ਦਾ/-ਦੀ + ਹੈ etc.','-ਆ','-ਗਾ','-ਣਾ'],a:0},
        {q:'"We speak" (mixed) →',opts:['ਬੋਲਦਾ ਹਾਂ','ਬੋਲਦੇ ਹਾਂ','ਬੋਲਦੀ ਹਾਂ','ਬੋਲਾਂਗੇ'],a:1},{q:'The verb form reveals the subject\'s…',opts:['age','gender & number','mood','wealth'],a:1}]},

  {id:'L12', title:'Questions', concept:'Question words (the "k-words"): ਕੀ what, ਕੌਣ who, ਕਿੱਥੇ where, ਕਦੋਂ when, ਕਿਉਂ why, ਕਿਵੇਂ how, ਕਿੰਨਾ how much, ਕਿਹੜਾ which. They usually sit just before the verb.',

        {q:'"How much is this?" → ਇਹ ___ ਦਾ ਹੈ?',opts:['ਕੀ','ਕਿੰਨੇ','ਕੌਣ','ਕਿਉਂ'],a:1},{q:'Question words usually go…',opts:['at the very end','just before the verb','first only','never used'],a:1}]},
]});

  {id:'L13', title:'Directions & Transportation', concept:'Direction words + the postposition ਵੱਲ ("toward"). "Turn" = ਮੁੜੋ. Common transport nouns are mostly masculine.',

  {id:'L14', title:'Shopping & Bargaining', concept:'Asking price: ਕਿੰਨੇ ਦਾ ਹੈ? (how much is it?). Bargaining imperatives: ਸਸਤਾ ਕਰੋ (make it cheaper), ਘੱਟ ਕਰੋ (reduce it).',

   vocab:[['ਕਿੰਨੇ ਦਾ','kinne daa','how much (price)'],['ਪੈਸੇ','paise','money'],['ਰੁਪਏ','rupaye','rupees'],['ਮਹਿੰਗਾ','mahingaa','expensive'],['ਸਸਤਾ','sastaa','cheap'],['ਘੱਟ ਕਰੋ','ghatt karo','reduce it'],['ਦੁਕਾਨ','dukaan','shop'],['ਦੁਕਾਨਦਾਰ','dukaandaar','shopkeeper'],['ਖ਼ਰੀਦਣਾ','khareedṇaa','to buy'],['ਵੇਚਣਾ','vechṇaa','to sell'],['ਬਿੱਲ','bill','bill'],['ਛੋਟ','chhot','discount']],
   sentences:[['ਇਹ ਕਿੰਨੇ ਦਾ ਹੈ?','ih kinne daa hai?','How much is this?'],['ਬਹੁਤ ਮਹਿੰਗਾ ਹੈ, ਸਸਤਾ ਕਰੋ।','bahut mahingaa hai, sastaa karo.','Too expensive, make it cheaper.'],['ਥੋੜ੍ਹੀ ਛੋਟ ਦਿਓ।','thoṛhee chhot dio.','Give a little discount.'],['ਮੈਂ ਇਹ ਖ਼ਰੀਦਾਂਗਾ।','maiṅ ih khareedaangaa.','I will buy this.'],['ਪੈਸੇ ਕਿੱਥੇ ਦੇਣੇ ਹਨ?','paise kitthe deṇe han?','Where do I pay?']],
   quiz:[{q:'"How much is this?" →',opts:['ਇਹ ਕੀ ਹੈ?','ਇਹ ਕਿੰਨੇ ਦਾ ਹੈ?','ਇਹ ਕਿੱਥੇ ਹੈ?','ਇਹ ਕੌਣ ਹੈ?'],a:1},{q:'"make it cheaper" →',opts:['ਘੱਟ ਕਰੋ / ਸਸਤਾ ਕਰੋ','ਮਹਿੰਗਾ ਕਰੋ','ਬੰਦ ਕਰੋ','ਖੋਲ੍ਹੋ'],a:0},
        {q:'ਦੁਕਾਨ = ?',opts:['money','shop','bill','discount'],a:1},{q:'Bargaining is expected in…',opts:['fixed-price shops','bazaars','banks','hospitals'],a:1}]},

  {id:'L15', title:'Past Tense — full conjugation', concept:'Past tense of transitive verbs uses the ERGATIVE: the subject takes ਨੇ and the verb agrees with the OBJECT, not the subject. ਮੈਂ ਰੋਟੀ ਖਾਧੀ = "I ate bread" (ਖਾਧੀ is feminine to match ਰੋਟੀ).',
   cultural:'This is the single hardest feature for English speakers. Intransitive verbs (go, come, sleep) do NOT take ਨੇ: ਮੈਂ ਗਿਆ (I went).',
   vocab:[['ਖਾਧਾ/ਖਾਧੀ','khaadhaa/khaadhee','ate (m/f object)'],['ਪੀਤਾ/ਪੀਤੀ','peetaa/peetee','drank'],['ਗਿਆ/ਗਈ','giaa/gaee','went'],['ਆਇਆ/ਆਈ','aaiaa/aaee','came'],['ਕੀਤਾ/ਕੀਤੀ','keetaa/keetee','did/made'],['ਵੇਖਿਆ/ਵੇਖੀ','vekhiaa/vekhee','saw'],['ਕਿਹਾ','kihaa','said'],['ਲਿਆ/ਲਈ','liaa/laee','took'],['ਦਿੱਤਾ/ਦਿੱਤੀ','dittaa/dittee','gave'],['ਸੁਣਿਆ/ਸੁਣੀ','suṇiaa/suṇee','heard']],
   sentences:[['ਮੈਂ ਰੋਟੀ ਖਾਧੀ।','maiṅ rotee khaadhee.','I ate bread. (ergative, fem obj)'],['ਉਸ ਨੇ ਚਾਹ ਪੀਤੀ।','us ne chaah peetee.','He/she drank tea.'],['ਮੈਂ ਘਰ ਗਿਆ।','maiṅ ghar giaa.','I went home. (no ਨੇ)'],['ਉਨ੍ਹਾਂ ਨੇ ਫ਼ਿਲਮ ਵੇਖੀ।','unhaaṅ ne film vekhee.','They watched a film.'],['ਅਸੀਂ ਕੰਮ ਕੀਤਾ।','aseeṅ kamm keetaa.','We did the work.']],
   quiz:[{q:'In ਮੈਂ ਰੋਟੀ ਖਾਧੀ, the verb agrees with…',opts:['ਮੈਂ (I)','ਰੋਟੀ (bread)','no one','the listener'],a:1},{q:'The ergative marker is…',opts:['ਨੂੰ','ਨੇ','ਦਾ','ਤੋਂ'],a:1},
        {q:'Which verb does NOT take ਨੇ?',opts:['ਖਾਣਾ','ਪੀਣਾ','ਜਾਣਾ','ਵੇਖਣਾ'],a:2},{q:'"went" (masc) is…',opts:['ਗਿਆ','ਗਈ','ਜਾਂਦਾ','ਜਾਵੇਗਾ'],a:0}]},

  {id:'L16', title:'Weather & Seasons', concept:'Weather uses impersonal constructions: ਮੀਂਹ ਪੈ ਰਿਹਾ ਹੈ (rain is falling = it is raining). Punjab has dramatic seasons tied to the agricultural year.',
   cultural:'The monsoon (ਸਾਉਣ) is celebrated in folk songs and the Teeyan festival; the harvest seasons drive Vaisakhi and Lohri. Punjab\'s summers (ਗਰਮੀ) are brutally hot, winters (ਸਰਦੀ) foggy and cold.',
   vocab:[['ਮੌਸਮ','mausam','weather'],['ਗਰਮੀ','garmee','summer/heat'],['ਸਰਦੀ','sardee','winter/cold'],['ਬਰਸਾਤ','barsaat','rainy season'],['ਬਸੰਤ','basant','spring'],['ਮੀਂਹ','meeṅh','rain'],['ਧੁੱਪ','dhupp','sunshine'],['ਬੱਦਲ','baddal','cloud'],['ਹਵਾ','havaa','wind/air'],['ਠੰਢ','thandh','cold(ness)'],['ਧੁੰਦ','dhund','fog'],['ਬਰਫ਼','baraf','snow/ice'],['ਗਰਜ','garaj','thunder'],['ਸਾਉਣ','saauṇ','monsoon month']],
   sentences:[['ਅੱਜ ਮੀਂਹ ਪੈ ਰਿਹਾ ਹੈ।','ajj meeṅh pai rihaa hai.','It is raining today.'],['ਗਰਮੀ ਬਹੁਤ ਹੈ।','garmee bahut hai.','It is very hot.'],['ਸਰਦੀ ਵਿੱਚ ਧੁੰਦ ਪੈਂਦੀ ਹੈ।','sardee vich dhund paindee hai.','It gets foggy in winter.'],['ਅਸਮਾਨ ਵਿੱਚ ਬੱਦਲ ਹਨ।','asmaan vich baddal han.','There are clouds in the sky.'],['ਹਵਾ ਠੰਢੀ ਹੈ।','havaa thandhee hai.','The wind is cold.']],
   quiz:[{q:'ਗਰਮੀ = ?',opts:['winter','summer','rain','fog'],a:1},{q:'"It is raining" →',opts:['ਮੀਂਹ ਪੈ ਰਿਹਾ ਹੈ','ਧੁੱਪ ਹੈ','ਠੰਢ ਹੈ','ਹਵਾ ਹੈ'],a:0},
        {q:'ਧੁੰਦ means…',opts:['snow','fog','thunder','wind'],a:1},{q:'The monsoon month is…',opts:['ਬਸੰਤ','ਸਾਉਣ','ਸਰਦੀ','ਗਰਮੀ'],a:1}]},
]});

LESSONS.push({level:5, levelName:'Social Life', lessons:[
  {id:'L17', title:'At a Punjabi Wedding', concept:'Ceremony vocabulary + congratulatory phrases. ਵਧਾਈਆਂ! = Congratulations! Address the couple with respect using ਜੀ.',
   cultural:'A Punjabi wedding (ਵਿਆਹ) spans days: Roka, Sangeet, Mehndi, Anand Karaj (the Sikh ceremony at the Gurdwara), and the reception. Guests dance bhangra, give shagun (cash gift in odd numbers like ₹101), and eat endlessly. As an American guest, "ਵਧਾਈਆਂ ਜੀ" and a little dancing wins hearts.',
   vocab:[['ਵਿਆਹ','viaah','wedding'],['ਲਾੜਾ','laaṛaa','groom'],['ਲਾੜੀ','laaṛee','bride'],['ਵਧਾਈਆਂ','vadhaaeeaaṅ','congratulations'],['ਆਨੰਦ ਕਾਰਜ','aanand kaaraj','Sikh wedding ceremony'],['ਮਹਿੰਦੀ','mahindee','henna'],['ਸੰਗੀਤ','sangeet','music night'],['ਬਰਾਤ','baraat','groom\'s procession'],['ਸ਼ਗਨ','shagan','ceremonial gift/money'],['ਜਾਂਞੀ','jaanjee','wedding guest (groom side)'],['ਡੋਲੀ','dolee','bride\'s departure'],['ਰਿਸ਼ਤਾ','rishtaa','relationship/match']],
   sentences:[['ਵਧਾਈਆਂ ਜੀ!','vadhaaeeaaṅ jee!','Congratulations!'],['ਲਾੜਾ-ਲਾੜੀ ਬਹੁਤ ਸੋਹਣੇ ਲੱਗ ਰਹੇ ਹਨ।','laaṛaa-laaṛee bahut sohṇe lagg rahe han.','The bride and groom look beautiful.'],['ਆਓ, ਬਰਾਤ ਆ ਗਈ।','aao, baraat aa gaee.','Come, the procession has arrived.'],['ਚਲੋ ਭੰਗੜਾ ਪਾਈਏ।','chalo bhangṛaa paaeeae.','Let\'s dance bhangra.'],['ਖਾਣਾ ਬਹੁਤ ਵਧੀਆ ਹੈ।','khaaṇaa bahut vadheeaa hai.','The food is excellent.']],
   quiz:[{q:'"Congratulations!" is…',opts:['ਧੰਨਵਾਦ','ਵਧਾਈਆਂ','ਮਾਫ਼ ਕਰਨਾ','ਸਤਿ ਸ੍ਰੀ ਅਕਾਲ'],a:1},{q:'The Sikh ceremony is called…',opts:['Sangeet','Anand Karaj','Mehndi','Roka'],a:1},
        {q:'ਲਾੜੀ = ?',opts:['groom','bride','guest','priest'],a:1},{q:'Shagun is usually given in…',opts:['even amounts','odd amounts (₹101)','gold only','flowers'],a:1}]},

  {id:'L18', title:'Future Tense', concept:'Future = verb-stem + ਵਾਂਗਾ/ਵਾਂਗੀ (I), ਏਂਗਾ/ਏਂਗੀ (you-inf), ਏਗਾ/ਏਗੀ (he/she), ਆਂਗੇ (we), ਓਗੇ (you-formal), ਣਗੇ (they). It still agrees with gender.',
   cultural:'Punjabis often soften future promises with ਰੱਬ ਨੇ ਚਾਹਿਆ ("God willing") — similar to "inshallah" in feel.',
   vocab:[['ਜਾਵਾਂਗਾ/ਜਾਵਾਂਗੀ','jaavaangaa/jaavaangee','will go (m/f)'],['ਖਾਵਾਂਗਾ/ਖਾਵਾਂਗੀ','khaavaangaa/khaavaangee','will eat'],['ਕਰਾਂਗਾ/ਕਰਾਂਗੀ','karaangaa/karaangee','will do'],['ਆਵਾਂਗਾ/ਆਵਾਂਗੀ','aavaangaa/aavaangee','will come'],['ਪੀਵਾਂਗਾ/ਪੀਵਾਂਗੀ','peevaangaa/peevaangee','will drink'],['ਬੋਲਾਂਗਾ/ਬੋਲਾਂਗੀ','bolaangaa/bolaangee','will speak'],['ਵੇਖਾਂਗਾ/ਵੇਖਾਂਗੀ','vekhaangaa/vekhaangee','will see'],['ਮਿਲਾਂਗਾ/ਮਿਲਾਂਗੀ','milaangaa/milaangee','will meet'],['ਪੜ੍ਹਾਂਗਾ/ਪੜ੍ਹਾਂਗੀ','paṛhaangaa/paṛhaangee','will study'],['ਸੌਂਵਾਂਗਾ/ਸੌਂਵਾਂਗੀ','sauṅvaangaa/sauṅvaangee','will sleep']],
   sentences:[['ਮੈਂ ਕੱਲ੍ਹ ਆਵਾਂਗਾ।','maiṅ kallh aavaangaa.','I will come tomorrow. (m)'],['ਅਸੀਂ ਫ਼ਿਲਮ ਵੇਖਾਂਗੇ।','aseeṅ film vekhaange.','We will watch a film.'],['ਤੁਸੀਂ ਕੀ ਖਾਓਗੇ?','tuseeṅ kee khaaoge?','What will you (formal) eat?'],['ਉਹ ਅਮਰੀਕਾ ਜਾਵੇਗੀ।','oh amreekaa jaavegee.','She will go to America.'],['ਰੱਬ ਨੇ ਚਾਹਿਆ, ਅਸੀਂ ਜਿੱਤਾਂਗੇ।','rabb ne chaahiaa, aseeṅ jittaange.','God willing, we will win.']],
   quiz:[{q:'"I will go" (masc) →',opts:['ਮੈਂ ਗਿਆ','ਮੈਂ ਜਾਂਦਾ ਹਾਂ','ਮੈਂ ਜਾਵਾਂਗਾ','ਮੈਂ ਜਾਵਾਂਗੀ'],a:2},{q:'Future "we" ending is…',opts:['-ਵਾਂਗਾ','-ਆਂਗੇ','-ਏਗਾ','-ਓਗੇ'],a:1},
        {q:'"God willing" feel comes from…',opts:['ਵਧਾਈਆਂ','ਰੱਬ ਨੇ ਚਾਹਿਆ','ਧੰਨਵਾਦ','ਮਾਫ਼ ਕਰਨਾ'],a:1},{q:'Future tense still marks…',opts:['gender','color','price','weather'],a:0}]},

  {id:'L19', title:'Expressing Emotions & Opinions', concept:'Many emotions use the "to me" dative ਮੈਨੂੰ + noun + lagdaa/hai: ਮੈਨੂੰ ਖ਼ੁਸ਼ੀ ਹੈ (I have happiness). Opinions: ਮੇਰੇ ਖ਼ਿਆਲ ਵਿੱਚ ("in my opinion").',
   cultural:'Punjabis are famously expressive and warm; understatement is rare. Strong feelings are voiced openly, and ਯਾਰ ("buddy") peppers casual emotional talk.',
   vocab:[['ਖ਼ੁਸ਼ੀ','khushee','happiness'],['ਉਦਾਸੀ','udaasee','sadness'],['ਗੁੱਸਾ','gussaa','anger'],['ਡਰ','dar','fear'],['ਪਿਆਰ','piaar','love'],['ਨਫ਼ਰਤ','nafrat','hatred'],['ਹੈਰਾਨੀ','hairaanee','surprise'],['ਮਾਣ','maaṇ','pride'],['ਸ਼ਰਮ','sharam','shame/shyness'],['ਉਮੀਦ','umeed','hope'],['ਮੇਰੇ ਖ਼ਿਆਲ ਵਿੱਚ','mere khiaal vich','in my opinion'],['ਮੈਨੂੰ ਲੱਗਦਾ ਹੈ','mainoo lagdaa hai','I think/feel']],
   sentences:[['ਮੈਨੂੰ ਬਹੁਤ ਖ਼ੁਸ਼ੀ ਹੈ।','mainoo bahut khushee hai.','I am very happy.'],['ਮੈਨੂੰ ਡਰ ਲੱਗਦਾ ਹੈ।','mainoo dar lagdaa hai.','I feel afraid.'],['ਮੇਰੇ ਖ਼ਿਆਲ ਵਿੱਚ ਇਹ ਠੀਕ ਹੈ।','mere khiaal vich ih theek hai.','In my opinion this is correct.'],['ਮੈਨੂੰ ਤੇਰੇ ਉੱਤੇ ਮਾਣ ਹੈ।','mainoo tere utte maaṇ hai.','I am proud of you.'],['ਯਾਰ, ਮੈਨੂੰ ਗੁੱਸਾ ਆ ਰਿਹਾ ਹੈ।','yaar, mainoo gussaa aa rihaa hai.','Buddy, I\'m getting angry.']],
   quiz:[{q:'ਪਿਆਰ = ?',opts:['anger','love','fear','pride'],a:1},{q:'"In my opinion" →',opts:['ਮੈਨੂੰ ਡਰ ਹੈ','ਮੇਰੇ ਖ਼ਿਆਲ ਵਿੱਚ','ਮੈਨੂੰ ਖ਼ੁਸ਼ੀ ਹੈ','ਯਾਰ'],a:1},
        {q:'Emotions often use the ___ case',opts:['ergative ਨੇ','dative ਮੈਨੂੰ','genitive ਦਾ','none'],a:1},{q:'ਗੁੱਸਾ means…',opts:['hope','anger','surprise','shame'],a:1}]},

  {id:'L20', title:'Telephone & Texting', concept:'Phone openers and quick texting slang. "Hello" on the phone is often the English ਹੈਲੋ; "speak" = ਗੱਲ ਕਰਨਾ (to do talk).',
   cultural:'Diaspora Punjabis blend English and Punjabi freely in texts ("ਕੀ ਹਾਲ, bro?"). Voice notes are hugely popular among elders who find typing Gurmukhi slow.',
   vocab:[['ਫ਼ੋਨ','fon','phone'],['ਗੱਲ ਕਰਨਾ','gall karnaa','to talk'],['ਸੁਨੇਹਾ','sunehaa','message'],['ਮਿਸ ਕਾਲ','mis kaal','missed call'],['ਨੰਬਰ','nambar','number'],['ਆਵਾਜ਼','aavaaz','voice/sound'],['ਰੁਕੋ','ruko','wait/hold'],['ਬਾਅਦ ਵਿੱਚ','baad vich','later'],['ਜਲਦੀ','jaldee','quickly/soon'],['ਠੀਕ ਹੈ','theek hai','okay'],['ਫ਼ੋਨ ਕਰਨਾ','fon karnaa','to call'],['ਸੁਣਾਈ ਨਹੀਂ ਦਿੰਦਾ','suṇaaee naheeṅ dindaa','can\'t hear']],
   sentences:[['ਹੈਲੋ, ਕੌਣ ਬੋਲ ਰਿਹਾ ਹੈ?','hailo, kauṇ bol rihaa hai?','Hello, who is speaking?'],['ਮੈਂ ਤੁਹਾਨੂੰ ਬਾਅਦ ਵਿੱਚ ਫ਼ੋਨ ਕਰਾਂਗਾ।','maiṅ tuhaanoo baad vich fon karaangaa.','I will call you later.'],['ਆਵਾਜ਼ ਸੁਣਾਈ ਨਹੀਂ ਦਿੰਦੀ।','aavaaz suṇaaee naheeṅ dindee.','I can\'t hear your voice.'],['ਜ਼ਰਾ ਰੁਕੋ।','zaraa ruko.','Please hold on.'],['ਸੁਨੇਹਾ ਭੇਜ ਦਿਓ।','sunehaa bhej dio.','Send the message.']],
   quiz:[{q:'"to talk" is…',opts:['ਫ਼ੋਨ ਕਰਨਾ','ਗੱਲ ਕਰਨਾ','ਸੁਣਨਾ','ਰੁਕੋ'],a:1},{q:'ਸੁਨੇਹਾ = ?',opts:['number','message','voice','phone'],a:1},
        {q:'"okay" in texting is…',opts:['ਠੀਕ ਹੈ','ਜਲਦੀ','ਰੁਕੋ','ਬਾਅਦ ਵਿੱਚ'],a:0},{q:'Elders often prefer ___ over typing',opts:['emails','voice notes','faxes','letters'],a:1}]},
]});

LESSONS.push({level:6, levelName:'Intermediate Grammar', lessons:[
  {id:'L21', title:'Postpositions in Depth', concept:'Punjabi places relation-words AFTER the noun (postpositions). When a postposition follows, the noun goes into oblique form: ਮੁੰਡਾ → ਮੁੰਡੇ ਨੂੰ.',
   cultural:'Mastering ਨੇ ਨੂੰ ਦਾ ਤੋਂ ਵਿੱਚ ਨਾਲ unlocks fluent sentence-building; these tiny words do the work English does with word order and prepositions.',
   vocab:[['ਨੇ','ne','(ergative subject marker)'],['ਨੂੰ','noo','to / (direct object)'],['ਦਾ/ਦੀ/ਦੇ','daa/dee/de','of / \'s (possessive)'],['ਤੋਂ','toṅ','from'],['ਵਿੱਚ','vich','in'],['ਉੱਤੇ','utte','on'],['ਨਾਲ','naal','with'],['ਲਈ','laee','for'],['ਵੱਲ','vall','toward'],['ਬਿਨਾਂ','binaaṅ','without'],['ਕੋਲ','kol','near / having'],['ਥੱਲੇ','thalle','under']],
   sentences:[['ਮੁੰਡੇ ਨੂੰ ਕਿਤਾਬ ਦਿਓ।','munde noo kitaab dio.','Give the book to the boy.'],['ਇਹ ਮੇਰੇ ਪਿਤਾ ਦਾ ਘਰ ਹੈ।','ih mere pitaa daa ghar hai.','This is my father\'s house.'],['ਮੈਂ ਦਿੱਲੀ ਤੋਂ ਆਇਆ ਹਾਂ।','maiṅ dillee toṅ aaiaa haaṅ.','I have come from Delhi.'],['ਚਾਹ ਦੁੱਧ ਨਾਲ ਪੀਓ।','chaah duddh naal pio.','Drink tea with milk.'],['ਇਹ ਤੁਹਾਡੇ ਲਈ ਹੈ।','ih tuhaade laee hai.','This is for you.']],
   quiz:[{q:'"from" is…',opts:['ਨੂੰ','ਤੋਂ','ਨਾਲ','ਵਿੱਚ'],a:1},{q:'Possessive "of/\'s" is…',opts:['ਨੇ','ਦਾ/ਦੀ/ਦੇ','ਲਈ','ਕੋਲ'],a:1},
        {q:'Relation words come ___ the noun',opts:['before','after','never','randomly'],a:1},{q:'ਨਾਲ means…',opts:['under','with','toward','without'],a:1}]},

  {id:'L22', title:'Compound & Aspectual Verbs', concept:'A main verb + a "light" auxiliary (ਜਾਣਾ go, ਲੈਣਾ take, ਦੇਣਾ give, ਆਉਣਾ come) adds nuance: ਖਾ ਲੈਣਾ (eat up, for oneself), ਦੇ ਦੇਣਾ (give away). The auxiliary carries the tense.',
   cultural:'These compounds make speech sound natural and "finished". Beginners sound robotic without them.',
   vocab:[['ਖਾ ਲੈਣਾ','khaa laiṇaa','to eat up'],['ਦੇ ਦੇਣਾ','de deṇaa','to give away'],['ਲੈ ਲੈਣਾ','lai laiṇaa','to take (for self)'],['ਚਲੇ ਜਾਣਾ','chale jaaṇaa','to go away'],['ਆ ਜਾਣਾ','aa jaaṇaa','to arrive/come'],['ਕਰ ਦੇਣਾ','kar deṇaa','to do (for someone)'],['ਪੈ ਜਾਣਾ','pai jaaṇaa','to fall / lie down'],['ਉੱਠ ਜਾਣਾ','utth jaaṇaa','to get up'],['ਮੁੱਕ ਜਾਣਾ','mukk jaaṇaa','to be finished'],['ਸੌਂ ਜਾਣਾ','sauṅ jaaṇaa','to fall asleep']],
   sentences:[['ਰੋਟੀ ਖਾ ਲੈ।','rotee khaa lai.','Eat the food up.'],['ਉਹ ਚਲਾ ਗਿਆ।','oh chalaa giaa.','He went away.'],['ਪੈਸੇ ਦੇ ਦਿਓ।','paise de dio.','Give the money (away).'],['ਮੈਂ ਜਲਦੀ ਸੌਂ ਗਿਆ।','maiṅ jaldee sauṅ giaa.','I fell asleep early.'],['ਕੰਮ ਮੁੱਕ ਗਿਆ।','kamm mukk giaa.','The work is finished.']],
   quiz:[{q:'"to eat up" =',opts:['ਖਾਣਾ','ਖਾ ਲੈਣਾ','ਖਾਧਾ','ਖਾਵਾਂਗਾ'],a:1},{q:'In a compound, tense is carried by the…',opts:['main verb','auxiliary','subject','object'],a:1},
        {q:'ਚਲੇ ਜਾਣਾ means…',opts:['to come','to go away','to stay','to sit'],a:1},{q:'Compounds make speech sound…',opts:['robotic','natural/finished','rude','formal only'],a:1}]},

  {id:'L23', title:'Causatives', concept:'Causatives add -ਆ/-ਵਾ to "make someone do X": ਕਰਨਾ (to do) → ਕਰਾਉਣਾ (to get done) → ਕਰਵਾਉਣਾ (to have done via another). Likewise ਖਾਣਾ → ਖੁਆਉਣਾ (to feed).',
   cultural:'Common in daily life: you don\'t "cut your hair", you "get your hair cut" (ਵਾਲ ਕਟਵਾਉਣਾ). Reflects a service-oriented social structure.',
   vocab:[['ਕਰਵਾਉਣਾ','karvaauṇaa','to have done'],['ਖੁਆਉਣਾ','khuaauṇaa','to feed'],['ਪਿਆਉਣਾ','piaauṇaa','to make drink'],['ਬਣਵਾਉਣਾ','baṇvaauṇaa','to have made'],['ਸਿਖਾਉਣਾ','sikhaauṇaa','to teach (make learn)'],['ਪੜ੍ਹਾਉਣਾ','paṛhaauṇaa','to teach'],['ਦਿਖਾਉਣਾ','dikhaauṇaa','to show (make see)'],['ਸੁਣਾਉਣਾ','suṇaauṇaa','to tell (make hear)'],['ਚਲਾਉਣਾ','chalaauṇaa','to drive/operate'],['ਮੰਗਵਾਉਣਾ','mangvaauṇaa','to order/get sent']],
   sentences:[['ਮੈਂ ਵਾਲ ਕਟਵਾਏ।','maiṅ vaal katvaae.','I got my hair cut.'],['ਮਾਂ ਬੱਚੇ ਨੂੰ ਖੁਆ ਰਹੀ ਹੈ।','maaṅ bachche noo khuaa rahee hai.','Mother is feeding the child.'],['ਅਧਿਆਪਕ ਪੰਜਾਬੀ ਪੜ੍ਹਾਉਂਦਾ ਹੈ।','adhiaapak panjaabee paṛhaaundaa hai.','The teacher teaches Punjabi.'],['ਮੈਨੂੰ ਫ਼ੋਟੋ ਦਿਖਾਓ।','mainoo foto dikhaao.','Show me the photo.'],['ਖਾਣਾ ਮੰਗਵਾ ਲਓ।','khaaṇaa mangvaa lao.','Order the food in.']],
   quiz:[{q:'"to feed" (make eat) is…',opts:['ਖਾਣਾ','ਖੁਆਉਣਾ','ਖਾਧਾ','ਖਾ ਲੈਣਾ'],a:1},{q:'Causatives add roughly…',opts:['-ਣਾ','-ਆ/-ਵਾ','-ਦਾ','-ਗਾ'],a:1},
        {q:'ਦਿਖਾਉਣਾ means…',opts:['to see','to show','to hide','to read'],a:1},{q:'"got my hair cut" reflects…',opts:['laziness','service-oriented phrasing','past tense only','future'],a:1}]},

  {id:'L24', title:'Relative Clauses & Conjunctions', concept:'Punjabi uses correlative pairs: ਜੋ…ਉਹ (who…that), ਜਿੱਥੇ…ਉੱਥੇ (where…there), ਜਦੋਂ…ਤਦੋਂ (when…then). Connectors: ਅਤੇ (and), ਪਰ (but), ਕਿਉਂਕਿ (because), ਇਸ ਲਈ (therefore).',
   cultural:'Spoken Punjabi often drops the second correlative; written/formal Punjabi keeps both for clarity.',
   vocab:[['ਜੋ','jo','who/which/that'],['ਜਿਹੜਾ','jihṛaa','the one who'],['ਜਿੱਥੇ','jitthe','where (rel.)'],['ਜਦੋਂ','jadoṅ','when (rel.)'],['ਅਤੇ','ate','and'],['ਪਰ','par','but'],['ਕਿਉਂਕਿ','kiuṅki','because'],['ਇਸ ਲਈ','is laee','therefore'],['ਜੇ','je','if'],['ਤਾਂ','taaṅ','then'],['ਜਾਂ','jaaṅ','or'],['ਫਿਰ ਵੀ','phir vee','even so']],
   sentences:[['ਜੋ ਮਿਹਨਤ ਕਰਦਾ ਹੈ, ਉਹ ਜਿੱਤਦਾ ਹੈ।','jo mihnat kardaa hai, oh jittdaa hai.','One who works hard, wins.'],['ਮੈਂ ਆਵਾਂਗਾ ਪਰ ਦੇਰ ਨਾਲ।','maiṅ aavaangaa par der naal.','I will come but late.'],['ਜੇ ਮੀਂਹ ਪਿਆ ਤਾਂ ਅਸੀਂ ਨਹੀਂ ਜਾਵਾਂਗੇ।','je meeṅh piaa taaṅ aseeṅ naheeṅ jaavaange.','If it rains then we won\'t go.'],['ਉਹ ਨਹੀਂ ਆਇਆ ਕਿਉਂਕਿ ਬਿਮਾਰ ਸੀ।','oh naheeṅ aaiaa kiuṅki bimaar see.','He didn\'t come because he was sick.'],['ਚਾਹ ਜਾਂ ਕੌਫ਼ੀ?','chaah jaaṅ kaufee?','Tea or coffee?']],
   quiz:[{q:'"but" is…',opts:['ਅਤੇ','ਪਰ','ਜਾਂ','ਜੇ'],a:1},{q:'"because" is…',opts:['ਇਸ ਲਈ','ਕਿਉਂਕਿ','ਫਿਰ ਵੀ','ਤਾਂ'],a:1},
        {q:'"if…then" pair is…',opts:['ਜੋ…ਉਹ','ਜੇ…ਤਾਂ','ਜਿੱਥੇ…ਉੱਥੇ','ਅਤੇ…ਪਰ'],a:1},{q:'Spoken Punjabi often ___ the 2nd correlative',opts:['repeats','drops','doubles','shouts'],a:1}]},
]});

LESSONS.push({level:7, levelName:'Conversational Topics', lessons:[
  {id:'L25', title:'Politics & Society', concept:'Vocabulary for civic discussion. Note many terms are shared with Hindi/Urdu and English loans (ਵੋਟ, ਪਾਰਟੀ).',
   cultural:'Punjab has a deeply political culture — farmers\' movements, Partition memory, and Sikh institutions shape debate. Discuss respectfully; opinions run strong.',
   vocab:[['ਸਰਕਾਰ','sarkaar','government'],['ਪ੍ਰਧਾਨ ਮੰਤਰੀ','pradhaan mantaree','prime minister'],['ਵੋਟ','vot','vote'],['ਚੋਣ','choṇ','election'],['ਪਾਰਟੀ','paartee','(political) party'],['ਨੇਤਾ','netaa','leader'],['ਕਿਸਾਨ','kisaan','farmer'],['ਹੱਕ','hakk','right(s)'],['ਕਾਨੂੰਨ','kaanoon','law'],['ਅੰਦੋਲਨ','andolan','movement/protest'],['ਆਜ਼ਾਦੀ','aazaadee','freedom'],['ਦੇਸ਼','desh','country']],
   sentences:[['ਚੋਣਾਂ ਅਗਲੇ ਮਹੀਨੇ ਹਨ।','choṇaaṅ agle maheene han.','Elections are next month.'],['ਕਿਸਾਨ ਆਪਣੇ ਹੱਕਾਂ ਲਈ ਲੜਦੇ ਹਨ।','kisaan aapṇe hakkaaṅ laee laṛde han.','Farmers fight for their rights.'],['ਇਹ ਕਾਨੂੰਨ ਨਵਾਂ ਹੈ।','ih kaanoon navaaṅ hai.','This law is new.'],['ਆਜ਼ਾਦੀ ਕੀਮਤੀ ਹੈ।','aazaadee keematee hai.','Freedom is precious.'],['ਤੁਸੀਂ ਕਿਸ ਪਾਰਟੀ ਨੂੰ ਵੋਟ ਦਿੱਤੀ?','tuseeṅ kis paartee noo vot dittee?','Which party did you vote for?']],
   quiz:[{q:'ਸਰਕਾਰ = ?',opts:['leader','government','election','law'],a:1},{q:'"farmer" is…',opts:['ਨੇਤਾ','ਕਿਸਾਨ','ਵੋਟ','ਦੇਸ਼'],a:1},
        {q:'ਆਜ਼ਾਦੀ means…',opts:['law','freedom','party','right'],a:1},{q:'Punjab\'s political culture is shaped by…',opts:['farmers\' movements & Partition','tourism only','no history','sports'],a:0}]},

  {id:'L26', title:'Sports', concept:'Sports talk uses ਖੇਡਣਾ (to play) + sport. Kabaddi and hockey are huge; cricket dominates conversation.',
   cultural:'Punjab is India\'s field-hockey heartland and the birthplace of circle-style Kabaddi, with massive village tournaments (ਕਬੱਡੀ ਕੱਪ) drawing diaspora stars.',
   vocab:[['ਖੇਡ','khed','game/sport'],['ਕਬੱਡੀ','kabaddee','kabaddi'],['ਹਾਕੀ','haakee','hockey'],['ਕ੍ਰਿਕਟ','krikat','cricket'],['ਫੁੱਟਬਾਲ','futtbaal','football/soccer'],['ਟੀਮ','teem','team'],['ਖਿਡਾਰੀ','khidaaree','player'],['ਜਿੱਤ','jitt','victory'],['ਹਾਰ','haar','defeat'],['ਮੈਚ','maich','match'],['ਗੋਲ','gol','goal'],['ਪਹਿਲਵਾਨ','pahilvaan','wrestler']],
   sentences:[['ਅਸੀਂ ਕਬੱਡੀ ਖੇਡਦੇ ਹਾਂ।','aseeṅ kabaddee khedde haaṅ.','We play kabaddi.'],['ਸਾਡੀ ਟੀਮ ਜਿੱਤ ਗਈ।','saadee teem jitt gaee.','Our team won.'],['ਮੈਚ ਕੱਲ੍ਹ ਹੈ।','maich kallh hai.','The match is tomorrow.'],['ਉਹ ਵਧੀਆ ਖਿਡਾਰੀ ਹੈ।','oh vadheeaa khidaaree hai.','He is a great player.'],['ਪੰਜਾਬ ਹਾਕੀ ਵਿੱਚ ਮਸ਼ਹੂਰ ਹੈ।','panjaab haakee vich mashhoor hai.','Punjab is famous in hockey.']],
   quiz:[{q:'"victory" is…',opts:['ਹਾਰ','ਜਿੱਤ','ਮੈਚ','ਟੀਮ'],a:1},{q:'Punjab\'s iconic village sport is…',opts:['cricket','kabaddi','tennis','golf'],a:1},
        {q:'ਖਿਡਾਰੀ = ?',opts:['team','player','goal','match'],a:1},{q:'"to play" verb is…',opts:['ਖੇਡਣਾ','ਜਿੱਤਣਾ','ਹਾਰਨਾ','ਦੌੜਨਾ'],a:0}]},

  {id:'L27', title:'Bollywood & Pollywood', concept:'Entertainment vocabulary; lots of English loans (ਫ਼ਿਲਮ, ਹੀਰੋ). "Pollywood" = the Punjabi film & music industry.',
   cultural:'Punjabi music is a global pop force — Diljit Dosanjh sold out US arenas; the late Sidhu Moosewala became a worldwide phenomenon. Bhangra beats appear in Western pop.',
   vocab:[['ਫ਼ਿਲਮ','film','film'],['ਗੀਤ','geet','song'],['ਗਾਇਕ','gaaik','singer'],['ਹੀਰੋ','heero','hero/lead'],['ਹੀਰੋਇਨ','heroin','heroine'],['ਨਾਚ','naach','dance'],['ਸੰਗੀਤ','sangeet','music'],['ਕਹਾਣੀ','kahaaṇee','story'],['ਪਰਦਾ','pardaa','screen'],['ਟਿਕਟ','tikat','ticket'],['ਮਸ਼ਹੂਰ','mashhoor','famous'],['ਪ੍ਰਸ਼ੰਸਕ','prashansak','fan']],

   quiz:[{q:'ਗਾਇਕ = ?',opts:['hero','singer','story','ticket'],a:1},{q:'Punjabi film industry nickname is…',opts:['Bollywood','Pollywood','Tollywood','Hollywood'],a:1},
        {q:'"famous" is…',opts:['ਮਸ਼ਹੂਰ','ਕਹਾਣੀ','ਨਾਚ','ਟਿਕਟ'],a:0},{q:'A global Punjabi music star is…',opts:['Diljit Dosanjh','Elvis','Adele','Drake'],a:0}]},

  {id:'L28', title:'Religion & Community', concept:'Respectful spiritual vocabulary. ਜੀ is added to holy names/people for respect. Greetings vary by faith.',
   cultural:'Punjab is religiously diverse — Sikh, Hindu, Muslim, Christian. The Gurdwara welcomes everyone for langar (free meal). Use neutral respect; never debate someone\'s faith.',
   vocab:[['ਧਰਮ','dharam','religion/duty'],['ਗੁਰਦੁਆਰਾ','gurduaaraa','Sikh temple'],['ਮੰਦਰ','mandar','Hindu temple'],['ਮਸਜਿਦ','masjid','mosque'],['ਗਿਰਜਾ','girjaa','church'],['ਅਰਦਾਸ','ardaas','prayer (Sikh)'],['ਲੰਗਰ','langar','free community kitchen'],['ਸੇਵਾ','sevaa','selfless service'],['ਵਾਹਿਗੁਰੂ','vaahiguroo','God (Sikh)'],['ਸੰਗਤ','sangat','congregation'],['ਪ੍ਰਸ਼ਾਦ','prashaad','blessed food'],['ਸ਼ਰਧਾ','shardhaa','devotion']],
   sentences:[['ਅਸੀਂ ਗੁਰਦੁਆਰੇ ਜਾਂਦੇ ਹਾਂ।','aseeṅ gurduaare jaande haaṅ.','We go to the Gurdwara.'],['ਲੰਗਰ ਸਭ ਲਈ ਖੁੱਲ੍ਹਾ ਹੈ।','langar sabh laee khullhaa hai.','Langar is open to all.'],['ਸੇਵਾ ਕਰਨੀ ਚੰਗੀ ਗੱਲ ਹੈ।','sevaa karnee changee gall hai.','Doing service is a good thing.'],['ਅਰਦਾਸ ਤੋਂ ਬਾਅਦ ਪ੍ਰਸ਼ਾਦ ਮਿਲਦਾ ਹੈ।','ardaas toṅ baad prashaad mildaa hai.','After prayer, prashaad is given.'],['ਸਾਰੇ ਧਰਮ ਸਤਿਕਾਰ ਯੋਗ ਹਨ।','saare dharam satkaar yog han.','All religions deserve respect.']],
   quiz:[{q:'The free community kitchen is…',opts:['ਸੇਵਾ','ਲੰਗਰ','ਅਰਦਾਸ','ਸੰਗਤ'],a:1},{q:'ਗੁਰਦੁਆਰਾ is a…',opts:['mosque','Sikh temple','church','Hindu temple'],a:1},
        {q:'ਸੇਵਾ means…',opts:['prayer','selfless service','food','God'],a:1},{q:'Best approach to others\' faith is…',opts:['debate it','neutral respect','ignore it','mock it'],a:1}]},
]});

LESSONS.push({level:8, levelName:'Idioms & Proverbs', lessons:[
  {id:'L29', title:'Everyday Idioms (ਮੁਹਾਵਰੇ)', concept:'Idioms are fixed phrases whose meaning differs from the literal words. Punjabi is rich in earthy, vivid idioms.',
   cultural:'Using one well-placed idiom signals real fluency and delights native speakers — they\'ll often laugh with surprise.',
   vocab:[['ਅੱਖ ਦਾ ਤਾਰਾ','akkh daa taaraa','apple of one\'s eye (lit. star of the eye)'],['ਨੱਕ ਵਿੱਚ ਦਮ ਕਰਨਾ','nakk vich dam karnaa','to harass (lit. put life in the nose)'],['ਹੱਥ ਤੰਗ ਹੋਣਾ','hatth tang hoṇaa','to be short of money'],['ਦਿਲ ਜਿੱਤਣਾ','dil jittṇaa','to win someone\'s heart'],['ਕੰਨ ਖੜ੍ਹੇ ਕਰਨਾ','kann khaṛhe karnaa','to become alert'],['ਮੂੰਹ ਫੁਲਾਉਣਾ','mooṅh phulaauṇaa','to sulk'],['ਅੱਗ ਲਾਉਣਾ','agg laauṇaa','to provoke (lit. set fire)'],['ਪੈਰ ਜੰਮਾਉਣਾ','pair jammaauṇaa','to establish oneself'],['ਅੱਖਾਂ ਖੋਲ੍ਹਣਾ','akkhaaṅ kholhṇaa','to open one\'s eyes (realize)'],['ਨੀਂਦ ਉੱਡ ਜਾਣਾ','neeṅd udd jaaṇaa','to lose sleep (worry)']],
   sentences:[['ਉਹ ਆਪਣੀ ਮਾਂ ਦੀ ਅੱਖ ਦਾ ਤਾਰਾ ਹੈ।','oh aapṇee maaṅ dee akkh daa taaraa hai.','He is the apple of his mother\'s eye.'],['ਅੱਜਕੱਲ੍ਹ ਮੇਰਾ ਹੱਥ ਤੰਗ ਹੈ।','ajjkallh meraa hatth tang hai.','These days I\'m short of money.'],['ਉਸ ਨੇ ਸਭ ਦਾ ਦਿਲ ਜਿੱਤ ਲਿਆ।','us ne sabh daa dil jitt liaa.','He won everyone\'s heart.'],['ਬੱਚਿਆਂ ਨੇ ਨੱਕ ਵਿੱਚ ਦਮ ਕਰ ਦਿੱਤਾ।','bachchiaaṅ ne nakk vich dam kar dittaa.','The kids drove me crazy.'],['ਖ਼ਬਰ ਸੁਣ ਕੇ ਕੰਨ ਖੜ੍ਹੇ ਹੋ ਗਏ।','khabar suṇ ke kann khaṛhe ho gae.','On hearing the news I became alert.']],
   quiz:[{q:'"ਅੱਖ ਦਾ ਤਾਰਾ" means…',opts:['eye doctor','apple of the eye','star gazing','blind'],a:1},{q:'ਹੱਥ ਤੰਗ ਹੋਣਾ =',opts:['strong hands','short of money','clean hands','busy'],a:1},
        {q:'"ਦਿਲ ਜਿੱਤਣਾ" means…',opts:['heart attack','win someone\'s heart','lose heart','heartbeat'],a:1},{q:'Idioms\' meaning is…',opts:['always literal','non-literal/fixed','grammatical only','numeric'],a:1}]},

  {id:'L30', title:'Proverbs (ਅਖਾਣ) I', concept:'Proverbs (ਅਖਾਣ) compress folk wisdom into a memorable line. Many rhyme.',
   cultural:'Elders quote proverbs to teach without lecturing. Knowing a few lets you bond across generations.',

  'Today, Indian Punjab (capital Chandigarh) is the heartland of Sikhism and Gurmukhi-script Punjabi; Pakistani Punjab is the country\'s most populous province and writes Punjabi in the Shahmukhi (Perso-Arabic) script. Key cities include Amritsar (home of the Golden Temple), Ludhiana, Patiala and Jalandhar in India, and Lahore in Pakistan.',
  'For learners, knowing this geography explains why Punjabi has two scripts, why diaspora communities span both Indian and Pakistani roots, and why rivers, wheat fields and the agricultural year saturate Punjabi songs, proverbs and festivals.'
 ]},
 {id:'food', icon:'utensils', title:'Food Culture', body:[
  'Punjabi cuisine is, for much of the world, the face of "Indian food". The dishes that fill restaurants abroad — butter chicken (murgh makhani), dal makhani, naan, tandoori chicken — are overwhelmingly Punjabi in origin.',
  'At the heart of this cuisine is the tandoor, a cylindrical clay oven that reaches blistering temperatures and gives naan and tandoori meats their characteristic char. Village and even urban homes historically shared a communal tandoor.',
  'Iconic dishes include: sarson da saag with makki di roti (mustard greens with cornbread), the ultimate Punjabi winter comfort food; chole bhature; rajma-chawal (kidney beans and rice); paneer dishes; and an enormous range of sweets — jalebi, ladoo, pinni, and barfi. Lassi, a frothy yogurt drink, is the signature beverage.',
  'No discussion of Punjabi food is complete without langar — the free community kitchen run at every Sikh Gurdwara. The Golden Temple in Amritsar serves free vegetarian meals to up to 100,000 people every single day, seated together on the floor regardless of religion, caste, or status. It is widely considered the world\'s largest free kitchen, and a profound expression of the Sikh values of equality (ਸਮਾਨਤਾ) and selfless service (ਸੇਵਾ).'
 ]},
 {id:'music', icon:'music', title:'Music & Dance', body:[
  'Bhangra began as a vigorous harvest dance performed by men in the fields of Punjab to the beat of the dhol drum, celebrating the wheat harvest around Vaisakhi. Over the 20th century it evolved into a stage and party phenomenon, and by the 1980s–90s it fused with Western pop, hip-hop and electronic music in the UK and Canada to become a global sound.',
  'Giddha is the energetic women\'s folk dance, built around clapping, spirited bolis (sung couplets), and call-and-response — sharp, witty, and often teasing in its lyrics.',
  'Punjab also holds a deep classical and devotional tradition: the hymns of the Guru Granth Sahib are set to specific raags (melodic modes), and kirtan (devotional singing) is central to Sikh worship.',
  'In the modern era Punjabi music is a worldwide commercial force. Diljit Dosanjh has sold out arenas across North America and performed at Coachella; AP Dhillon brought a slick diaspora-pop sound to global charts; and the late Sidhu Moosewala became a generational icon whose influence only grew after his death in 2022. Traditional instruments still anchor the sound: the ਢੋਲ (dhol), ਤੁੰਬੀ (tumbi, a one-string instrument), ਅਲਗੋਜ਼ੇ (twin flutes), and ਸਾਰੰਗੀ (bowed strings).'
 ]},
 {id:'festivals', icon:'sparkles', title:'Festivals', body:[
  'Vaisakhi (around April 13) is the most important Punjabi festival. It marks the spring harvest AND the founding of the Khalsa by Guru Gobind Singh in 1699 — a defining moment in Sikh history. Streets fill with Nagar Kirtan processions, bhangra, and langar.',
  'Lohri (mid-January) celebrates the winter solstice and the end of the coldest days. Families gather around bonfires, toss sesame seeds, peanuts and popcorn into the flames, sing folk songs, and especially celebrate newborns and new brides in the family.',
  'Teeyan is a monsoon festival of women, tied to the month of Saawan, featuring giddha, swings hung from trees, and henna — a joyful reunion of women, often at their parental homes.',
  'Diwali in Punjab carries a special Sikh significance as Bandi Chhor Divas, commemorating the release of Guru Hargobind Ji (and 52 imprisoned princes) from the Gwalior Fort; the Golden Temple is spectacularly illuminated. Hola Mohalla, the day after Holi, is a Sikh festival of martial arts (gatka), mock battles, and displays of Nihang warrior tradition.'
 ]},
 {id:'diaspora', icon:'globe', title:'Punjabi Diaspora in America', body:[
  'Some of the earliest South Asian immigrants to the United States were Punjabi Sikhs who arrived on the West Coast in the very early 1900s, settling especially in California\'s agricultural valleys, where their farming expertise was prized.',
  'Discriminatory immigration and land laws of that era barred many from bringing wives or owning land in their own names. One remarkable result was a community of Punjabi-Mexican families in California\'s Imperial Valley: Punjabi men married Mexican-American women, blending names, foods and traditions in a unique early-20th-century American story.',
  'Yuba City, California, hosts the largest Nagar Kirtan (Sikh processional festival) outside India, drawing well over 100,000 people each November — a vivid sign of how deeply rooted the community has become.',
  'Today Punjabi-Americans are prominent across agriculture, trucking and logistics, medicine, technology in Silicon Valley, and military service. Diaspora speech blends English and Punjabi freely ("ਕੀ ਹਾਲ, bro?"), and gurdwaras from California to New York continue the langar tradition, feeding anyone who walks in.'
 ]},
 {id:'proverbs', icon:'quote', title:'Proverbs & Philosophy', body:[
  'Punjabi proverbs (ਅਖਾਣ) compress generations of village wisdom into vivid, often rhyming lines. Elders deploy them to teach gently, settle arguments, or puncture pretension. Below are twenty, each with its literal image, true meaning, and an American equivalent.'
 ], proverbs:true},
 {id:'family', icon:'git-branch', title:'Language Family Tree', body:[
  'Punjabi belongs to the Indo-European language family — the same vast family as English, Spanish, French, German, Greek and Persian. The lineage runs: Indo-European → Indo-Iranian → Indo-Aryan → Punjabi. This shared ancestry, dating back thousands of years, means Punjabi and English are distant cousins.',
  'That kinship surfaces in surprising cognates. Punjabi "ਮਾਂ" (maa, mother) echoes English "mother", Latin "mater", Spanish "madre". "ਨਾਮ" (naam, name) mirrors English "name", Latin "nomen". Numbers rhyme too: ਤਿੰਨ (tinn) / "three" / Spanish "tres"; ਸੱਤ (satt) / Latin "septem" / "seven".',
  'A distinctive feature of Punjabi among Indo-Aryan languages is that it is TONAL — pitch can change meaning, a trait it shares with very few other languages in the family. This developed historically from the loss of voiced-aspirate consonants.',
  'For American learners, the Indo-European connection is genuinely useful: the SOV grammar and gendered nouns will feel familiar to anyone who has studied Spanish or French (gender) or Latin/German (case endings), and the cognate vocabulary gives small but real footholds while you build fluency.'
 ]},
];

function useDebounced(value, ms){
  const [v,setV]=useState(value);
  useEffect(()=>{ const t=setTimeout(()=>setV(value),ms); return ()=>clearTimeout(t); },[value,ms]);
  return v;
}

          <p className="text-pj-ink/80 text-sm">When a consonant is written <em>beneath</em> another using the halant, it forms a cluster. The most common are <span className="gur gur-min text-pj-purple" lang="pa">੍ਰ</span> (pairin rara, “r”), <span className="gur gur-min text-pj-purple" lang="pa">੍ਹ</span> (pairin haha, adds breathiness) and <span className="gur gur-min text-pj-purple" lang="pa">੍ਵ</span> (pairin wawwa, “v”). Example: ਪ੍ਰ = <strong>pra</strong>, as in ਪ੍ਰੇਮ (prem, love).</p>

}

function ScriptQuiz({setProgress}){
  const pool=useMemo(()=>GURMUKHI.filter(g=>g.category==='consonant'),[]);
  const [q,setQ]=useState(null);
  const [answer,setAnswer]=useState('');
  const [feedback,setFeedback]=useState(null);
  const [score,setScore]=useState(0);
  const [streak,setStreak]=useState(0);
  const [asked,setAsked]=useState(0);
  const inputRef=useRef(null);

  const next=useCallback(()=>{
    const item=pool[Math.floor(Math.random()*pool.length)];
    setQ(item); setAnswer(''); setFeedback(null);
    setTimeout(()=>inputRef.current&&inputRef.current.focus(),50);
  },[pool]);
  useEffect(()=>{ next(); },[next]);

  const norm=s=>s.toLowerCase().trim().replace(/[^a-z]/g,'');
  const submit=(e)=>{
    e&&e.preventDefault();
    if(!q||feedback) return;
    const correct=q.romanization.split('/').map(norm);
    const ok=correct.includes(norm(answer));
    setAsked(a=>a+1);
    if(ok){
      const ns=score+1; setScore(ns); const nstreak=streak+1; setStreak(nstreak);
      setFeedback({ok:true,msg:'ਸ਼ਾਬਾਸ਼! Correct — '+q.name});
      if(nstreak>0 && nstreak%5===0) fireConfetti(80);
      setProgress && setProgress('script', Math.min(100, ns*4));
    }else{
      setStreak(0);
      setFeedback({ok:false,msg:'It was “'+q.romanization+'” ('+q.name+')'});
    }
  };
  return (
    <Card className="p-6 sm:p-8 text-center max-w-lg mx-auto">
      <div className="flex justify-between text-sm font-display font-bold mb-4">
        <span className="text-pj-ink/60">Score: <span className="text-pj-green">{score}</span>/{asked}</span>
        <span className="text-pj-ink/60">Streak: <span className="text-pj-orange">{streak}🔥</span></span>
      </div>
      <p className="text-pj-ink/70 text-sm mb-2">Type the romanization of this letter:</p>
      <AP mode="wait">
        <Mdiv key={q?q.char:'x'} initial={{opacity:0,scale:.8}} animate={{opacity:1,scale:1}} exit={{opacity:0}} transition={{duration:.2}}>
          <div className="gur text-pj-orange leading-none my-4" style={{fontSize:120}} lang="pa">{q&&q.char}</div>
        </Mdiv>
      </AP>
      <div className="flex justify-center mb-4"><Speak text={q?(q.exampleWord||q.char):''} label="this letter"/></div>
      <form onSubmit={submit} className="flex gap-2 max-w-xs mx-auto">
        <input ref={inputRef} value={answer} onChange={e=>setAnswer(e.target.value)} disabled={!!feedback}
          placeholder="e.g. k, kh, g…" className="flex-1 rounded-xl px-4 py-3 font-display font-bold text-center text-lg outline-none focus:ring-2 focus:ring-pj-orange" style={{border:'1px solid #f0d9c4'}}/>
        {!feedback
          ? <button type="submit" className="btn btn-primary">Check</button>
          : <button type="button" onClick={next} className="btn btn-gold">Next →</button>}
      </form>
      {feedback && (
        <Mdiv initial={{opacity:0,y:6}} animate={{opacity:1,y:0}} className={'mt-4 font-display font-bold '+(feedback.ok?'text-pj-green':'text-pj-red')}>
          {feedback.ok?'✓ ':'✗ '}{feedback.msg}
        </Mdiv>
      )}
    </Card>
  );
}

function Phrasebook(){
  const cats=useMemo(()=>{ const seen=[]; PHRASES.forEach(p=>{ if(!seen.includes(p.cat)) seen.push(p.cat); }); return seen; },[]);
  const [cat,setCat]=useState(cats[0]);
  const [raw,setRaw]=useState('');
  const query=useDebounced(raw,200);
  const fmtColor={casual:'green',formal:'primary',sacred:'gold'};

  const list=useMemo(()=>{
    let arr=PHRASES;
    if(query.trim()){
      const q=query.toLowerCase();
      arr=PHRASES.filter(p=>p.en.toLowerCase().includes(q)||p.rom.toLowerCase().includes(q)||p.gurmukhi.includes(query)||(p.cat||'').toLowerCase().includes(q));
    } else {
      arr=PHRASES.filter(p=>p.cat===cat);
    }
    return arr;
  },[query,cat]);

  return (
    <div className="pb-28">
      <div className="sunset-hero phulkari-top px-5 pt-10 pb-10 text-center">
        <Pill color="gold">{PHRASES.length} PHRASES</Pill>

          <span className="absolute left-3 top-1/2 -translate-y-1/2"><Icon name="search" size={18} color="#c9a48a"/></span>
          <input value={raw} onChange={e=>setRaw(e.target.value)} placeholder="Search all phrases (English, romanization or Gurmukhi)…"
            className="w-full rounded-2xl pl-10 pr-4 py-3 outline-none focus:ring-2 focus:ring-pj-orange shadow-soft" style={{border:'1px solid #f0d9c4'}}/>
        </div>
        {!query.trim() && (
          <div className="flex gap-2 overflow-x-auto no-scrollbar pb-3 mb-2">

              <button key={c} onClick={()=>setCat(c)} className={'btn shrink-0 !py-2 !px-3 text-sm '+(cat===c?'btn-primary':'btn-ghost')}>{c}</button>
            ))}
          </div>
        )}
        <div className="text-pj-ink/60 text-sm font-display font-bold mb-3 px-1">{list.length} {list.length===1?'phrase':'phrases'}{query.trim()?' found':' in '+cat}</div>
        <div className="grid sm:grid-cols-2 gap-3">
          {list.map(p=>(
            <Card key={p.id} className="p-4">
              <div className="flex items-start gap-3">
                <Speak text={p.gurmukhi} sm label={p.en}/>
                <div className="min-w-0 flex-1">
                  <div className="gur gur-min text-pj-ink leading-snug" lang="pa">{p.gurmukhi}</div>
                  <div className="text-sm text-pj-orange font-bold">{p.rom}</div>
                  <div className="text-sm text-pj-ink/80">{p.en}</div>
                  {p.literal && <div className="text-xs text-pj-ink/50 italic mt-0.5">lit. “{p.literal}”</div>}
                  {p.note && <div className="text-xs text-pj-ink/60 mt-1">{p.note}</div>}
                </div>
                <Pill color={fmtColor[p.formality]||'primary'} className="shrink-0 !text-[10px]">{p.formality}</Pill>
              </div>
            </Card>
          ))}

                    <button onClick={()=>toggleKnown(key)} title="Mark known"
                      className={'shrink-0 w-8 h-8 rounded-lg flex items-center justify-center '+(known[key]?'bg-pj-green':'bg-gray-100')}>
                      <Icon name="check" size={16} color={known[key]?'#fff':'#bbb'}/>
                    </button>
                  </Card>
                );
              })}
            </div>
            {browseList.length===0 && <div className="text-center text-pj-ink/50 py-10">No words match “{query}”.</div>}
          </>
        )}

        {mode==='flash' && <Flashcards known={known} toggleKnown={toggleKnown} themes={themes}/>}
      </div>
    </div>
  );
}

function Flashcards({known,toggleKnown,themes}){
  const [theme,setTheme]=useState('All themes');
  const deck=useMemo(()=>{
    let words=theme==='All themes'?VOCABULARY.flat:VOCABULARY.flat.filter(w=>w.theme===theme);
    // SRS: unknown words first (and more), known words rarely
    const unknown=words.filter(w=>!known[w.g+'|'+w.r]);
    const knownArr=words.filter(w=>known[w.g+'|'+w.r]);
    return shuffle(unknown).concat(shuffle(knownArr).slice(0,Math.ceil(knownArr.length*0.2)));
  },[theme,known]);
  const [i,setI]=useState(0);
  const [flipped,setFlipped]=useState(false);
  useEffect(()=>{ setI(0); setFlipped(false); },[theme]);
  const card=deck[i]||VOCABULARY.flat[0];
  const key=card?card.g+'|'+card.r:'';
  const next=(markKnownVal)=>{
    if(markKnownVal!=null){ const isK=!!known[key]; if(markKnownVal!==isK) toggleKnown(key); }
    setFlipped(false);
    setI(x=>(x+1)%Math.max(1,deck.length));
  };
  return (
    <div className="max-w-md mx-auto">
      <div className="flex gap-2 overflow-x-auto no-scrollbar pb-3 mb-3">
        {['All themes',...themes].map(t=>(
          <button key={t} onClick={()=>setTheme(t)} className={'btn shrink-0 !py-1.5 !px-3 text-xs '+(theme===t?'btn-primary':'btn-ghost')}>{t}</button>
        ))}
      </div>
      <div className="text-center text-pj-ink/60 text-sm font-display font-bold mb-3">Card {deck.length?i+1:0} of {deck.length} · learning {deck.filter(w=>!known[w.g+'|'+w.r]).length}</div>
      <div className="flip mx-auto" style={{maxWidth:360,height:240}} onClick={()=>setFlipped(f=>!f)}>
        <div className={'flip-inner '+(flipped?'flipped':'')}>
          <div className="flip-face card-cream flex flex-col items-center justify-center cursor-pointer">
            <div className="gur text-pj-orange" style={{fontSize:54}} lang="pa">{card.g}</div>
            <div className="text-pj-ink/50 text-sm mt-2">tap to flip</div>
          </div>
          <div className="flip-face flip-back glass flex flex-col items-center justify-center cursor-pointer">
            <div className="font-display font-bold text-2xl text-white">{card.e}</div>
            <div className="text-pj-gold font-bold mt-1">{card.r}</div>
            <div className="text-purple-100/70 text-xs mt-2">{card.theme}</div>
          </div>
        </div>
      </div>
      <div className="flex justify-center mt-4"><Speak text={card.g} label={card.e}/></div>
      <div className="grid grid-cols-2 gap-3 mt-4">
        <button onClick={()=>next(false)} className="btn !bg-red-100 !text-pj-red font-bold"><Icon name="rotate-ccw" size={16} color="#E74C3C"/>&nbsp;Still learning</button>
        <button onClick={()=>next(true)} className="btn !bg-green-100 !text-pj-green font-bold"><Icon name="check" size={16} color="#2ECC71"/>&nbsp;I know it</button>
      </div>
    </div>
  );
}

/* ---- GAME 1: Script Speed Quiz ---- */
function ScriptSpeedGame(){
  const pool=useMemo(()=>GURMUKHI.filter(g=>g.category==='consonant'),[]);
  const [speed,setSpeed]=useState(false);
  const [running,setRunning]=useState(false);
  const [q,setQ]=useState(pool[5]);
  const [ans,setAns]=useState('');
  const [fb,setFb]=useState(null);
  const [score,setScore]=useState(0);
  const [streak,setStreak]=useState(0);
  const [time,setTime]=useState(30);
  const ref=useRef();
  const norm=s=>s.toLowerCase().trim().replace(/[^a-z]/g,'');

  useEffect(()=>{
    if(speed&&running&&time>0){ const t=setTimeout(()=>setTime(x=>x-1),1000); return ()=>clearTimeout(t); }
    if(speed&&running&&time===0){ setRunning(false); if(score>0) fireConfetti(100); }
  },[speed,running,time,score]);

  const newQ=()=>{ setQ(pool[Math.floor(Math.random()*pool.length)]); setAns(''); setFb(null); setTimeout(()=>ref.current&&ref.current.focus(),30); };
  const start=()=>{ setScore(0); setStreak(0); setTime(30); setRunning(true); newQ(); };
  const submit=(e)=>{ e&&e.preventDefault(); if(!running||fb) return;
    const ok=q.romanization.split('/').map(norm).includes(norm(ans));
    if(ok){ setScore(s=>s+1); const st=streak+1; setStreak(st); if(!speed&&st%5===0) fireConfetti(70);
      if(speed) newQ(); else setFb({ok:true,msg:q.name}); }
    else { setStreak(0); setFb({ok:false,msg:q.romanization+' · '+q.name}); if(speed) setTimeout(newQ,700); }
  };

  return (
    <Card className="p-6 text-center">
      <div className="flex justify-center gap-2 mb-4">
        <button onClick={()=>{setSpeed(false);setRunning(false);}} className={'btn !py-1.5 !px-3 text-sm '+(!speed?'btn-primary':'btn-ghost')}>Relaxed</button>
        <button onClick={()=>{setSpeed(true);setRunning(false);}} className={'btn !py-1.5 !px-3 text-sm '+(speed?'btn-primary':'btn-ghost')}>⏱ 30-sec Speed</button>
      </div>
      <ScoreBar score={score} extra={speed?<span className="text-pj-orange">⏱ {time}s</span>:<span className="text-pj-orange">Streak {streak}🔥</span>}/>
      {(!running && (speed||score===0)) || (speed&&time===0&&!running) ? (
        <div className="py-6">
          {speed&&time===0 && <div className="font-display font-extrabold text-2xl text-pj-ink mb-3">Time! You scored {score}.</div>}
          <button onClick={start} className="btn btn-primary">{speed?'Start 30-second round':'Start'}</button>
        </div>
      ) : (
        <>
          <p className="text-pj-ink/70 text-sm mb-2">Type this letter’s sound:</p>
          <div className="gur text-pj-orange leading-none my-3" style={{fontSize:110}} lang="pa">{q.char}</div>
          <form onSubmit={submit} className="flex gap-2 max-w-xs mx-auto">
            <input ref={ref} autoFocus value={ans} onChange={e=>setAns(e.target.value)} disabled={!!fb&&!speed}
              className="flex-1 rounded-xl px-4 py-3 font-display font-bold text-center text-lg outline-none focus:ring-2 focus:ring-pj-orange" style={{border:'1px solid #f0d9c4'}} placeholder="sound"/>
            {(!fb||speed) ? <button className="btn btn-primary">Go</button> : <button type="button" onClick={newQ} className="btn btn-gold">Next →</button>}
          </form>
          {fb&&!speed && <div className={'mt-3 font-display font-bold '+(fb.ok?'text-pj-green':'text-pj-red')}>{fb.ok?'✓ '+fb.msg:'✗ '+fb.msg}</div>}
        </>
      )}
    </Card>
  );
}

/* ---- GAME 2: Translation Challenge ---- */
function TranslateGame(){
  const flat=useMemo(()=>VOCABULARY.flat,[]);
  const byLen=useMemo(()=>({
    easy: flat.filter(w=>w.theme==='Animals'||w.theme==='Food & Drink'||w.theme==='Numbers & Quantity'||w.theme==='Colors'),
    medium: flat,
    hard: flat.filter(w=>w.theme==='Verbs'||w.theme==='Emotions'||w.theme==='Adjectives & Descriptions'||w.theme==='People & Society'),
  }),[flat]);
  const [diff,setDiff]=useState('easy');
  const [q,setQ]=useState(null);
  const [opts,setOpts]=useState([]);
  const [picked,setPicked]=useState(null);
  const [score,setScore]=useState(0);
  const [streak,setStreak]=useState(0);

  const next=useCallback(()=>{
    const pool=byLen[diff].length>=4?byLen[diff]:flat;
    const correct=pool[Math.floor(Math.random()*pool.length)];
    const wrong=sample(flat.filter(w=>w.g!==correct.g),3);
    setQ(correct); setOpts(shuffle([correct,...wrong])); setPicked(null);
  },[diff,byLen,flat]);
  useEffect(()=>{ next(); },[next]);

  const pick=(o)=>{ if(picked) return; setPicked(o);
    if(o.g===q.g){ setScore(s=>s+1); const st=streak+1; setStreak(st); if(st%5===0) fireConfetti(80); }
    else setStreak(0);
  };
  if(!q) return null;
  return (
    <Card className="p-6">
      <div className="flex justify-center gap-2 mb-4">
        {['easy','medium','hard'].map(d=>(
          <button key={d} onClick={()=>{setDiff(d);}} className={'btn !py-1.5 !px-3 text-sm capitalize '+(diff===d?'btn-primary':'btn-ghost')}>{d}</button>
        ))}
      </div>
      <ScoreBar score={score} extra={<span className="text-pj-orange">Streak {streak}🔥</span>}/>
      <p className="text-pj-ink/70 text-sm text-center mb-1">How do you say:</p>
      <div className="font-display font-extrabold text-3xl text-pj-ink text-center mb-5">“{q.e}”</div>
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
        {opts.map((o,i)=>{
          let cls='bg-white hover:bg-orange-50';
          if(picked){ if(o.g===q.g) cls='bg-green-100 ring-2 ring-pj-green'; else if(o===picked) cls='bg-red-100 ring-2 ring-pj-red'; else cls='bg-white opacity-60'; }
          return (
            <button key={i} onClick={()=>pick(o)} disabled={!!picked} className={'rounded-xl p-3 flex items-center justify-between gap-2 transition '+cls} style={{border:'1px solid #f0d9c4'}}>
              <span className="gur gur-min text-pj-ink" lang="pa">{o.g}</span>
              <Speak text={o.g} sm/>
            </button>
          );
        })}
      </div>
      {picked && <button onClick={next} className="btn btn-gold w-full mt-4">Next →</button>}
    </Card>
  );
}

/* ---- GAME 3: Listening Drill ---- */
function ListeningGame(){
  const flat=useMemo(()=>VOCABULARY.flat,[]);
  const [q,setQ]=useState(null);
  const [opts,setOpts]=useState([]);
  const [picked,setPicked]=useState(null);
  const [score,setScore]=useState(0);
  const [streak,setStreak]=useState(0);
  const next=useCallback(()=>{
    const correct=flat[Math.floor(Math.random()*flat.length)];
    const wrong=sample(flat.filter(w=>w.g!==correct.g),3);
    setQ(correct); setOpts(shuffle([correct,...wrong])); setPicked(null);
    setTimeout(()=>Speech.speak(correct.g),300);
  },[flat]);
  useEffect(()=>{ next(); },[next]);
  const pick=(o)=>{ if(picked) return; setPicked(o);
    if(o.g===q.g){ setScore(s=>s+1); const st=streak+1; setStreak(st); if(st%5===0) fireConfetti(80); } else setStreak(0);
  };
  if(!q) return null;
  return (
    <Card className="p-6 text-center">
      <ScoreBar score={score} extra={<span className="text-pj-orange">Streak {streak}🔥</span>}/>
      <p className="text-pj-ink/70 text-sm mb-3">Listen, then pick the word you heard:</p>
      <button onClick={()=>Speech.speak(q.g)} className="btn btn-primary mb-5 mx-auto"><Icon name="volume-2" size={20} color="#fff"/>&nbsp;Play again</button>

          return (
            <button key={i} onClick={()=>pick(o)} disabled={!!picked} className={'rounded-xl p-4 transition '+cls} style={{border:'1px solid #f0d9c4'}}>
              <div className="gur gur-min text-pj-ink" lang="pa">{o.g}</div>
              {picked && <div className="text-xs text-pj-ink/60 mt-1">{o.e}</div>}
            </button>
          );
        })}
      </div>
      {picked && <button onClick={next} className="btn btn-gold w-full mt-4">Next →</button>}
    </Card>
  );
}

  {sent:'ਮੁੰਡਾ ___ ਖੇਡਦਾ ਹੈ।', rom:'mundaa ___ kheddaa hai', en:'The boy plays in the park.', a:'ਪਾਰਕ ਵਿੱਚ', opts:['ਪਾਰਕ ਵਿੱਚ','ਪਾਰਕ ਨੂੰ','ਪਾਰਕ ਤੋਂ','ਪਾਰਕ ਦਾ'], why:'“in” = the postposition ਵਿੱਚ.'},
  {sent:'ਮੈਨੂੰ ਚਾਹ ___ ਹੈ।', rom:'mainoo chaah ___ hai', en:'I like tea.', a:'ਪਸੰਦ', opts:['ਪਸੰਦ','ਚੰਗਾ','ਖੁਸ਼','ਪਿਆਰ'], why:'“to like” uses ਪਸੰਦ ਹੋਣਾ with ਨੂੰ.'},
  {sent:'ਉਸ ___ ਰੋਟੀ ਖਾਧੀ।', rom:'us ___ rotee khaadhee', en:'She ate bread. (ergative)', a:'ਨੇ', opts:['ਨੇ','ਨੂੰ','ਦਾ','ਤੋਂ'], why:'Past transitive verbs take the ergative marker ਨੇ.'},
  {sent:'ਤੁਸੀਂ ਕਿੱਥੇ ___ ਹੋ?', rom:'tuseeṅ kitthe ___ ho', en:'Where do you live?', a:'ਰਹਿੰਦੇ', opts:['ਰਹਿੰਦੇ','ਰਿਹਾ','ਰਹੋਗੇ','ਰਹਿਣਾ'], why:'Present habitual with ਤੁਸੀਂ = ਰਹਿੰਦੇ ਹੋ.'},
];
function BlankGame(){
  const [i,setI]=useState(()=>Math.floor(Math.random()*BLANKS.length));
  const [opts,setOpts]=useState(()=>shuffle(BLANKS[i].opts));
  const [picked,setPicked]=useState(null);
  const [score,setScore]=useState(0);
  const [streak,setStreak]=useState(0);
  const q=BLANKS[i];
  const next=()=>{ const ni=Math.floor(Math.random()*BLANKS.length); setI(ni); setOpts(shuffle(BLANKS[ni].opts)); setPicked(null); };
  const pick=(o)=>{ if(picked) return; setPicked(o);
    if(o===q.a){ setScore(s=>s+1); const st=streak+1; setStreak(st); if(st%5===0) fireConfetti(80); } else setStreak(0);
  };
  return (
    <Card className="p-6">
      <ScoreBar score={score} extra={<span className="text-pj-orange">Streak {streak}🔥</span>}/>
      <p className="text-pj-ink/70 text-sm text-center mb-2">Fill the blank · <span className="italic">{q.en}</span></p>
      <div className="text-center my-4">
        <div className="gur gur-lg text-pj-ink leading-relaxed" lang="pa">{q.sent}</div>
        <div className="text-sm text-pj-orange font-semibold mt-1">{q.rom}</div>
      </div>
      <div className="grid grid-cols-2 gap-2">
        {opts.map((o,oi)=>{
          let cls='bg-white hover:bg-orange-50';
          if(picked){ if(o===q.a) cls='bg-green-100 ring-2 ring-pj-green'; else if(o===picked) cls='bg-red-100 ring-2 ring-pj-red'; else cls='bg-white opacity-60'; }
          return <button key={oi} onClick={()=>pick(o)} disabled={!!picked} className={'rounded-xl p-3 transition '+cls} style={{border:'1px solid #f0d9c4'}}><span className="gur gur-min text-pj-ink" lang="pa">{o}</span></button>;
        })}
      </div>
      {picked && <div className="mt-4"><div className="text-sm text-pj-ink/75 text-center mb-3">{q.why}</div><button onClick={next} className="btn btn-gold w-full">Next →</button></div>}
    </Card>
  );
}

/* ---- GAME 5: Word Scramble ---- */
function ScrambleGame(){
  const flat=useMemo(()=>VOCABULARY.flat.filter(w=>/^[a-zA-Z]+$/.test(w.r) && w.r.length>=3 && w.r.length<=8),[]);
  const [q,setQ]=useState(null);
  const [tiles,setTiles]=useState([]);
  const [build,setBuild]=useState([]);
  const [score,setScore]=useState(0);
  const [streak,setStreak]=useState(0);
  const [solved,setSolved]=useState(false);

  const scrambleOf=(word)=>{ let s; do{ s=shuffle(word.split('')); }while(s.join('')===word && word.length>1); return s; };
  const next=useCallback(()=>{
    const w=flat[Math.floor(Math.random()*flat.length)];
    setQ(w); setTiles(scrambleOf(w.r).map((c,idx)=>({c,id:idx}))); setBuild([]); setSolved(false);
  },[flat]);
  useEffect(()=>{ next(); },[next]);

  const placeTile=(t)=>{ if(solved) return; setTiles(ts=>ts.filter(x=>x.id!==t.id)); setBuild(b=>{ const nb=[...b,t]; checkWin(nb); return nb; }); };
  const removeTile=(t)=>{ if(solved) return; setBuild(b=>b.filter(x=>x.id!==t.id)); setTiles(ts=>[...ts,t]); };
  const checkWin=(nb)=>{ if(q && nb.length===q.r.length){ if(nb.map(x=>x.c).join('')===q.r){ setSolved(true); setScore(s=>s+1); const st=streak+1; setStreak(st); fireConfetti(st%5===0?120:70); } } };
  if(!q) return null;
  return (
    <Card className="p-6 text-center">
      <ScoreBar score={score} extra={<span className="text-pj-orange">Streak {streak}🔥</span>}/>
      <p className="text-pj-ink/70 text-sm mb-1">Unscramble the romanization for:</p>
      <div className="flex items-center justify-center gap-2 mb-1"><span className="gur gur-lg text-pj-orange" lang="pa">{q.g}</span><Speak text={q.g} sm label={q.e}/></div>
      <div className="font-display font-bold text-pj-ink mb-5">“{q.e}”</div>
      <div className="min-h-[56px] flex flex-wrap gap-2 justify-center items-center p-3 rounded-xl bg-orange-50 mb-4" style={{border:'2px dashed #FFB37E'}}>
        {build.length===0 && <span className="text-pj-ink/40 text-sm">tap letters below…</span>}
        {build.map(t=>(
          <button key={t.id} onClick={()=>removeTile(t)} className={'w-10 h-10 rounded-lg font-display font-extrabold text-lg '+(solved?'bg-pj-green text-white':'bg-white text-pj-ink')} style={{border:'1px solid #f0d9c4'}}>{t.c}</button>
        ))}
      </div>
      <div className="flex flex-wrap gap-2 justify-center mb-4">
        {tiles.map(t=>(
          <button key={t.id} onClick={()=>placeTile(t)} className="w-10 h-10 rounded-lg bg-white font-display font-extrabold text-lg text-pj-orange hover:bg-orange-50" style={{border:'1px solid #f0d9c4'}}>{t.c}</button>
        ))}
      </div>
      {solved
        ? <div><div className="font-display font-bold text-pj-green mb-3">✓ Correct! {q.r}</div><button onClick={next} className="btn btn-gold w-full">Next →</button></div>
        : <button onClick={next} className="btn btn-ghost text-sm">Skip / new word</button>}
    </Card>
  );
}

function PunjabMap(){
  const ref=useRef(null);
  const mapRef=useRef(null);
  useEffect(()=>{
    if(!ref.current || mapRef.current || !window.L) return;
    const map=window.L.map(ref.current,{scrollWheelZoom:false,attributionControl:true}).setView([31.1,74.9],6);
    window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:12,attribution:'© OpenStreetMap'}).addTo(map);
    const cities=[
      ['Lahore',31.5497,74.3436,'Cultural capital of historic & Pakistani Punjab'],
      ['Amritsar',31.6340,74.8723,'Home of the Golden Temple (Harmandir Sahib)'],
      ['Chandigarh',30.7333,76.7794,'Shared capital of Indian Punjab & Haryana'],
      ['Ludhiana',30.9010,75.8573,'Largest city & industrial hub of Indian Punjab'],
      ['Patiala',30.3398,76.3869,'Royal city, famed for the Patiala salwar & peg'],
    ];
    cities.forEach(([n,la,lo,d])=>{ window.L.marker([la,lo]).addTo(map).bindPopup('<b>'+n+'</b><br>'+d); });
    mapRef.current=map;
    setTimeout(()=>map.invalidateSize(),200);
    return ()=>{ if(mapRef.current){ mapRef.current.remove(); mapRef.current=null; } };
  },[]);
  return <div ref={ref} className="w-full rounded-2xl overflow-hidden" style={{height:320,border:'1px solid #f0d9c4'}}/>;
}

/* ============================================================================
   APP SHELL — 8-tab navigation, transitions, lazy render, progress, HC toggle
   ============================================================================ */
const TABS=[
  {key:'start', label:'Start', icon:'home', Comp:StartHere},
  {key:'script', label:'Script', icon:'languages', Comp:Script},
  {key:'lessons', label:'Lessons', icon:'graduation-cap', Comp:Lessons},
  {key:'phrasebook', label:'Phrases', icon:'message-circle', Comp:Phrasebook},
  {key:'vocab', label:'Words', icon:'book-open', Comp:Vocabulary},
  {key:'grammar', label:'Grammar', icon:'list-tree', Comp:Grammar},
  {key:'practice', label:'Practice', icon:'gamepad-2', Comp:Practice},
  {key:'culture', label:'Culture', icon:'landmark', Comp:Culture},
];

function App(){
  const [active,setActive]=useState(()=>LS.get('active_tab','start'));
  const [mounted,setMounted]=useState(()=>({[LS.get('active_tab','start')]:true}));
  const [progress,setProgressState]=useState(()=>LS.get('progress',{}));
  const [hc,setHc]=useState(()=>LS.get('hc',false));
  const [toast,setToast]=useState('');
  const toastT=useRef();

  useEffect(()=>{ document.body.classList.toggle('hc',hc); LS.set('hc',hc); },[hc]);
  useEffect(()=>{ LS.set('active_tab',active); },[active]);

  const setProgress=useCallback((key,pct)=>{
    setProgressState(p=>{ const n={...p,[key]:Math.max(p[key]||0,pct)}; LS.set('progress',n); return n; });
  },[]);

  const go=useCallback((key)=>{
    setMounted(m=>({...m,[key]:true}));
    setActive(key);
    window.scrollTo({top:0,behavior:'smooth'});
  },[]);

  const showToast=useCallback((msg)=>{ setToast(msg); clearTimeout(toastT.current); toastT.current=setTimeout(()=>setToast(''),4500); },[]);

  // Surface speech problems (no voice / unsupported) to the user as a toast
  useEffect(()=>{ Speech.warnCb = showToast; return ()=>{ Speech.warnCb = null; }; },[showToast]);

  // ensure lucide icons render after tab swap
  useEffect(()=>{ const t=setTimeout(()=>{ try{ window.lucide&&window.lucide.createIcons(); }catch(e){} },120); return ()=>clearTimeout(t); },[active]);

  return (
    <div className="min-h-screen">
      {/* HC toggle floating */}
      <button onClick={()=>{ setHc(h=>!h); showToast(!hc?'High contrast on':'High contrast off'); }}
        className="fixed top-3 right-3 z-[8000] w-11 h-11 rounded-full glass flex items-center justify-center shadow-soft"
        aria-label="Toggle high contrast" title="Toggle high contrast">
        <Icon name="contrast" size={20} color="#FFD700"/>
      </button>

      {/* PAGES (lazy: only mounted tabs render; only active is visible) */}
      <main>
        {TABS.map(t=>{
          if(!mounted[t.key]) return null;
          const C=t.Comp;
          return (
            <div key={t.key} style={{display:active===t.key?'block':'none'}}>
              <AP mode="wait">
                {active===t.key && (
                  <Mdiv initial={{opacity:0,y:8}} animate={{opacity:1,y:0}} transition={{duration:.3}}>
                    <C progress={progress} setProgress={setProgress} go={go}/>
                  </Mdiv>
                )}
              </AP>
            </div>
          );
        })}
      </main>

      <Toast msg={toast}/>

      {/* BOTTOM TAB BAR */}
      <nav className="tabbar no-scrollbar" role="tablist" aria-label="Main navigation">
        {TABS.map(t=>(
          <button key={t.key} role="tab" aria-selected={active===t.key}
            onClick={()=>go(t.key)} className={'tab-item '+(active===t.key?'active':'')}>
            <span className="tab-ico"><Icon name={t.icon} size={22} color={active===t.key?'#FF6B2B':'#9a8aa5'}/></span>
            <span>{t.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
